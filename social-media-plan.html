<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Strategy & Project Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#00549A;
      --accent:#0070CA;
      --bg:#F9F9F7;
      --surface:rgba(255,255,255,.68);
      --border:rgba(148,163,184,.34);
      --text:#0F172A;
      --muted:#64748B;
      --shadow:0 24px 55px rgba(15,23,42,.14);
      --radius:16px;
      --font:"Inter","Helvetica Neue",Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:var(--font);color:var(--text);line-height:1.5}
    .container{max-width:1280px;margin:0 auto;padding:24px 18px 40px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:600}
    .brand-text strong{display:block;font-size:15px}
    .brand-text span{font-size:13px;color:var(--muted)}
    .toggle{display:flex;gap:8px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px}
    .toggle button{border:0;background:transparent;border-radius:999px;padding:9px 14px;font:inherit;color:var(--muted);cursor:pointer}
    .toggle button.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}

    .panel{background:linear-gradient(145deg,rgba(255,255,255,.82),rgba(255,255,255,.54));backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .panel h2{margin:0 0 10px;font-size:1rem}
    .panel h3{margin:0 0 8px;font-size:.9rem;color:#334155}
    input,textarea,select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:10px;font:inherit;background:#fff}

    .global-grid,.strategy-grid,.metrics-grid,.notes-grid{display:grid;gap:12px;margin-top:14px}
    .global-grid{grid-template-columns:repeat(5,minmax(120px,1fr))}
    .strategy-grid{grid-template-columns:repeat(4,minmax(140px,1fr))}
    .metrics-grid{grid-template-columns:repeat(4,minmax(120px,1fr))}
    .notes-grid{grid-template-columns:1fr 1fr}

    .main-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-top:14px}
    .meta-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .meta-actions{display:flex;gap:8px;align-items:center}
    .week-badge{font-size:.82rem;background:rgba(148,163,184,.15);padding:5px 9px;border-radius:999px}
    .subtle-btn{border:1px solid var(--border);background:#fff;padding:7px 10px;border-radius:10px;cursor:pointer;font:inherit}
    .saved-text{font-size:.82rem;color:var(--muted)}

    .priority-list{margin:0;padding-left:20px;display:grid;gap:8px}
    .hidden{display:none}
    .calendar-board{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:10px}
    .day{border:1px solid rgba(148,163,184,.28);background:#fff;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:150px}
    .day.active{outline:2px solid rgba(0,112,202,.25)}
    .day-name{font-weight:600;font-size:.84rem}
    .post-tile{border:1px solid rgba(148,163,184,.3);background:#f8fafc;border-radius:10px;padding:8px;display:grid;gap:6px;text-align:left;cursor:pointer}
    .post-title{font-size:.83rem;font-weight:600}
    .post-meta{display:flex;justify-content:space-between;font-size:.72rem;color:#475569}
    .post-status{text-transform:capitalize;font-size:.68rem;font-weight:600;letter-spacing:.04em}
    .status-planned{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .status-in-progress{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
    .status-posted{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .add-post{margin-top:auto;border:1px dashed rgba(100,116,139,.45);background:#f8fafc;border-radius:10px;padding:8px;font-size:.8rem;cursor:pointer}

    .task-list{display:grid;gap:8px}
    .task-item{display:grid;grid-template-columns:22px 1fr 100px 115px;gap:8px;align-items:center}
    .task-item.done input[type="text"]{text-decoration:line-through;color:#64748B}

    .metric-card{background:#fff;border:1px solid rgba(148,163,184,.3);border-radius:10px;padding:10px}
    .metric-card span{font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
    .metric-card strong{display:block;font-size:1.1rem;margin-top:4px}

    .compact .day{min-height:120px;padding:8px}
    .compact .post-title{font-size:.75rem}
    .compact .task-item{grid-template-columns:18px 1fr 90px 95px}

    .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}
    .modal.open{display:flex}
    .modal-card{width:min(680px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:16px;padding:20px;border:1px solid var(--border)}
    .modal-head{display:flex;justify-content:space-between;align-items:center}
    .close-btn{border:0;background:#e2e8f0;border-radius:10px;width:34px;height:34px;cursor:pointer}
    .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .full{grid-column:1 / -1}
    .status-picker,.tag-picker{grid-column:1 / -1;display:flex;flex-wrap:wrap;gap:8px}
    .status-tag,.tag-chip{border:1px solid var(--border);background:#fff;border-radius:999px;padding:6px 10px;cursor:pointer;font:inherit;font-size:.78rem}
    .status-tag.active,.tag-chip.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-color:transparent}

    @media (max-width:1024px){.global-grid,.strategy-grid,.metrics-grid{grid-template-columns:repeat(2,minmax(130px,1fr))}.calendar-board{grid-template-columns:repeat(2,minmax(130px,1fr))}.main-grid,.notes-grid{grid-template-columns:1fr}}
    @media (max-width:680px){.global-grid,.strategy-grid,.metrics-grid{grid-template-columns:1fr}.task-item{grid-template-columns:22px 1fr}}
  </style>
</head>
<body>
  <main class="container" id="pageRoot">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">IS</div>
        <div class="brand-text">
          <strong>Social Strategy & Project Tracker</strong>
          <span id="brandSubtitle">Integrated Staffing</span>
        </div>
      </div>
      <div class="toggle" role="tablist" aria-label="Staffing brand toggle">
        <button type="button" data-brand="is" class="active">IS</button>
        <button type="button" data-brand="as">AS</button>
        <button type="button" data-brand="ad">AD</button>
      </div>
    </header>

    <section class="panel">
      <h2>Global View</h2>
      <div class="global-grid">
        <label>Campaign<select id="campaignFilter"><option>All campaigns</option><option>Q1 Hiring Push</option><option>Employer Branding</option><option>Lead Gen</option></select></label>
        <label>Owner<select id="ownerFilter"><option>All owners</option><option>Marketing</option><option>Design</option><option>Sales</option></select></label>
        <label>Date range<input id="dateRange" type="week" /></label>
        <label>Search<input id="quickSearch" placeholder="/ to search posts and tasks" /></label>
        <label>View mode<select id="viewMode"><option value="normal">Comfortable</option><option value="compact">Compact</option></select></label>
      </div>
    </section>

    <section class="panel strategy-grid">
      <div>
        <h3>Goal</h3>
        <input id="goal" placeholder="e.g., Increase qualified applicants by 20%" />
      </div>
      <div>
        <h3>Audience</h3>
        <input id="audience" placeholder="e.g., Mid-level finance professionals" />
      </div>
      <div>
        <h3>Theme</h3>
        <input id="theme" placeholder="e.g., Career growth stories" />
      </div>
      <div>
        <h3>KPI Target</h3>
        <input id="kpiTarget" placeholder="e.g., 4.5% engagement rate" />
      </div>
    </section>

    <section class="panel">
      <div class="meta-row">
        <span class="week-badge" id="weekBadge">Week of --</span>
        <div class="meta-actions">
          <span id="saveState" class="saved-text">Saved</span>
          <button id="clearWeek" type="button" class="subtle-btn">Reset week</button>
        </div>
      </div>
      <h2>Priorities</h2>
      <ul class="priority-list">
        <li><input id="priority1" type="text" placeholder="Priority 1" /></li>
        <li id="priorityItem2" class="hidden"><input id="priority2" type="text" placeholder="Priority 2" /></li>
        <li id="priorityItem3" class="hidden"><input id="priority3" type="text" placeholder="Priority 3" /></li>
      </ul>
    </section>

    <section class="main-grid">
      <section class="panel">
        <h2>Execution Calendar</h2>
        <div class="calendar-board" id="calendar"></div>
      </section>
      <section class="panel">
        <h2>Performance Snapshot</h2>
        <div class="metrics-grid">
          <div class="metric-card"><span>Planned</span><strong id="metricPlanned">0</strong></div>
          <div class="metric-card"><span>In Progress</span><strong id="metricInProgress">0</strong></div>
          <div class="metric-card"><span>Posted</span><strong id="metricPosted">0</strong></div>
          <div class="metric-card"><span>Tasks Done</span><strong id="metricTasks">0%</strong></div>
        </div>
      </section>
    </section>

    <section class="notes-grid">
      <section class="panel">
        <h2>Insights & Notes</h2>
        <textarea id="notes" rows="7" placeholder="Wins, blockers, experiments, and next actions"></textarea>
      </section>
      <section class="panel">
        <h2>Task Tracking</h2>
        <div class="task-list" id="todoList"></div>
        <button type="button" class="subtle-btn" id="newTaskBtn">New task</button>
      </section>
    </section>

    <div class="modal" id="editorModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div class="modal-head">
          <h2 id="editorTitle">Post Details • Monday</h2>
          <button type="button" class="close-btn" id="closeModal" aria-label="Close post editor">×</button>
        </div>
        <div class="fields">
          <input id="postTitle" class="full" placeholder="Post title" />
          <div class="tag-picker" id="platformPicker" aria-label="Select post platforms">
            <button type="button" class="tag-chip" data-platform="LinkedIn">LinkedIn</button>
            <button type="button" class="tag-chip" data-platform="Facebook">Facebook</button>
            <button type="button" class="tag-chip" data-platform="Instagram">Instagram</button>
          </div>
          <input id="time" type="time" />
          <input id="contentPillar" placeholder="Content pillar" />
          <input id="status" class="full" type="hidden" />
          <div class="status-picker" id="statusPicker" aria-label="Post status">
            <button type="button" class="status-tag" data-status="planned">Planned</button>
            <button type="button" class="status-tag" data-status="in progress">In Progress</button>
            <button type="button" class="status-tag" data-status="posted">Posted</button>
          </div>
          <textarea id="caption" class="full" rows="3" placeholder="Caption"></textarea>
          <input id="cta" class="full" placeholder="CTA" />
          <input id="asset" class="full" placeholder="Asset link" />
        </div>
      </section>
    </div>
  </main>

  <script>
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    const STORAGE_KEY = "weekly-social-plan-v3";

    const calendar = document.getElementById("calendar");
    const weekBadge = document.getElementById("weekBadge");
    const saveState = document.getElementById("saveState");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const brandMark = document.getElementById("brandMark");
    const editorModal = document.getElementById("editorModal");
    const closeModal = document.getElementById("closeModal");
    const buttons = document.querySelectorAll(".toggle button");
    const statusPicker = document.getElementById("statusPicker");
    const priorityItem2 = document.getElementById("priorityItem2");
    const priorityItem3 = document.getElementById("priorityItem3");
    const platformPicker = document.getElementById("platformPicker");
    const todoList = document.getElementById("todoList");
    const newTaskBtn = document.getElementById("newTaskBtn");
    const pageRoot = document.getElementById("pageRoot");

    const fields = {
      priority1: document.getElementById("priority1"),
      priority2: document.getElementById("priority2"),
      priority3: document.getElementById("priority3"),
      notes: document.getElementById("notes"),
      postTitle: document.getElementById("postTitle"),
      time: document.getElementById("time"),
      status: document.getElementById("status"),
      caption: document.getElementById("caption"),
      cta: document.getElementById("cta"),
      asset: document.getElementById("asset"),
      contentPillar: document.getElementById("contentPillar"),
      goal: document.getElementById("goal"),
      audience: document.getElementById("audience"),
      theme: document.getElementById("theme"),
      kpiTarget: document.getElementById("kpiTarget"),
      dateRange: document.getElementById("dateRange"),
      quickSearch: document.getElementById("quickSearch"),
      viewMode: document.getElementById("viewMode")
    };

    function emptyBrandState() {
      return { priorities: ["", "", ""], notes: "", strategy: { goal:"", audience:"", theme:"", kpiTarget:"" }, todos: [{ text: "", done: false, owner: "Marketing", due: "" }], posts: {} };
    }

    const state = { brand: "is", selectedDay: "Monday", data: { is: emptyBrandState(), as: emptyBrandState(), ad: emptyBrandState() }, filters: { search: "", compact: false } };

    function formatWeekOf(date = new Date()) {
      const day = date.getDay();
      const diffToMonday = (day + 6) % 7;
      const monday = new Date(date);
      monday.setDate(date.getDate() - diffToMonday);
      return monday.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function setSavedLabel(text) { saveState.textContent = text; }
    function escapeHtml(text) { return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;"); }
    function currentPost() { const posts = state.data[state.brand].posts; if (!posts[state.selectedDay]) posts[state.selectedDay] = {}; return posts[state.selectedDay]; }
    function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); setSavedLabel("Saved"); }

    function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        ["is", "as", "ad"].forEach((brand) => {
          const source = parsed[brand] || {};
          const todos = Array.isArray(source.todos) ? source.todos : [];
          state.data[brand] = {
            ...emptyBrandState(),
            ...source,
            strategy: { ...emptyBrandState().strategy, ...(source.strategy || {}) },
            todos: (todos.length ? todos : [{ text:"", done:false, owner:"Marketing", due:"" }]).map((todo) => ({
              text: String((todo && todo.text) || ""),
              done: Boolean(todo && todo.done),
              owner: String((todo && todo.owner) || "Marketing"),
              due: String((todo && todo.due) || "")
            }))
          };
        });
      } catch { console.warn("Unable to parse saved social plan data."); }
    }

    function statusClass(status) {
      const normalized = String(status || "").toLowerCase().trim();
      if (normalized === "planned") return "status-planned";
      if (normalized === "in progress") return "status-in-progress";
      if (normalized === "posted") return "status-posted";
      return "";
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      const query = state.filters.search.toLowerCase().trim();
      DAYS.forEach((day) => {
        const dayCard = document.createElement("article");
        dayCard.className = "day" + (day === state.selectedDay ? " active" : "");
        const post = state.data[state.brand].posts[day] || {};
        const haystack = `${post.postTitle || ""} ${post.caption || ""} ${post.cta || ""}`.toLowerCase();
        const visible = !query || haystack.includes(query) || day.toLowerCase().includes(query);
        if (!visible) {
          dayCard.style.display = "none";
        }
        dayCard.innerHTML = `<span class="day-name">${day}</span>`;
        if (post.postTitle) {
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = `post-tile ${statusClass(post.status)}`.trim();
          tile.innerHTML = `<span class="post-title">${escapeHtml(post.postTitle)}</span><span class="post-meta"><span>${escapeHtml((post.platforms || []).join(", ") || "Set platform")}</span><span>${escapeHtml(post.time || "Set time")}</span></span><span class="post-status">${escapeHtml(post.status || "planned")}</span>`;
          tile.addEventListener("click", () => openEditor(day));
          dayCard.appendChild(tile);
        } else {
          const add = document.createElement("button");
          add.type = "button";
          add.className = "add-post";
          add.textContent = "Add post";
          add.addEventListener("click", () => openEditor(day));
          dayCard.appendChild(add);
        }
        calendar.appendChild(dayCard);
      });
    }

    function renderTodos() {
      const query = state.filters.search.toLowerCase().trim();
      todoList.innerHTML = "";
      state.data[state.brand].todos.forEach((todo, index) => {
        const searchable = `${todo.text} ${todo.owner}`.toLowerCase();
        if (query && !searchable.includes(query)) return;
        const row = document.createElement("div");
        row.className = "task-item" + (todo.done ? " done" : "");
        row.innerHTML = `
          <input type="checkbox" data-todo-check="${index}" ${todo.done ? "checked" : ""} />
          <input type="text" data-todo-text="${index}" placeholder="Task" value="${escapeHtml(todo.text)}" />
          <select data-todo-owner="${index}"><option ${todo.owner === "Marketing" ? "selected" : ""}>Marketing</option><option ${todo.owner === "Design" ? "selected" : ""}>Design</option><option ${todo.owner === "Sales" ? "selected" : ""}>Sales</option></select>
          <input type="date" data-todo-due="${index}" value="${escapeHtml(todo.due)}" />`;
        todoList.appendChild(row);
      });
    }

    function updateMetrics() {
      const posts = Object.values(state.data[state.brand].posts || {});
      const total = state.data[state.brand].todos.length || 1;
      const done = state.data[state.brand].todos.filter((item) => item.done).length;
      document.getElementById("metricPlanned").textContent = posts.filter((p) => (p.status || "planned") === "planned").length;
      document.getElementById("metricInProgress").textContent = posts.filter((p) => (p.status || "") === "in progress").length;
      document.getElementById("metricPosted").textContent = posts.filter((p) => (p.status || "") === "posted").length;
      document.getElementById("metricTasks").textContent = `${Math.round((done / total) * 100)}%`;
    }

    function syncPriorityVisibility() {
      const [p1, p2, p3] = state.data[state.brand].priorities.map((item) => String(item || "").trim());
      priorityItem2.classList.toggle("hidden", !(p1 || p2 || p3));
      priorityItem3.classList.toggle("hidden", !(p2 || p3));
    }

    function openEditor(day) {
      state.selectedDay = day;
      editorModal.classList.add("open");
      editorModal.setAttribute("aria-hidden", "false");
      render();
    }

    function render() {
      const brandConfig = {
        is: { primary: "#00549A", accent: "#0070CA", subtitle: "Integrated Staffing", mark: "IS" },
        as: { primary: "#C77800", accent: "#F0A31A", subtitle: "Accountant Staffing", mark: "AS" },
        ad: { primary: "#21356e", accent: "#21356e", subtitle: "Administrative Staffing", mark: "AD" }
      };
      const currentBrand = brandConfig[state.brand] || brandConfig.is;
      document.documentElement.style.setProperty("--primary", currentBrand.primary);
      document.documentElement.style.setProperty("--accent", currentBrand.accent);
      brandSubtitle.textContent = currentBrand.subtitle;
      brandMark.textContent = currentBrand.mark;
      buttons.forEach((btn) => btn.classList.toggle("active", btn.dataset.brand === state.brand));

      pageRoot.classList.toggle("compact", state.filters.compact);
      const priorities = state.data[state.brand].priorities || ["", "", ""];
      fields.priority1.value = priorities[0] || "";
      fields.priority2.value = priorities[1] || "";
      fields.priority3.value = priorities[2] || "";
      fields.notes.value = state.data[state.brand].notes || "";

      const strategy = state.data[state.brand].strategy || {};
      fields.goal.value = strategy.goal || "";
      fields.audience.value = strategy.audience || "";
      fields.theme.value = strategy.theme || "";
      fields.kpiTarget.value = strategy.kpiTarget || "";

      const post = currentPost();
      document.getElementById("editorTitle").textContent = `Post Details • ${state.selectedDay}`;
      ["postTitle","time","status","caption","cta","asset","contentPillar"].forEach((key) => { fields[key].value = post[key] || ""; });
      const selectedPlatforms = Array.isArray(post.platforms) ? post.platforms : [];
      platformPicker.querySelectorAll(".tag-chip").forEach((chip) => chip.classList.toggle("active", selectedPlatforms.includes(chip.dataset.platform)));
      statusPicker.querySelectorAll(".status-tag").forEach((tag) => tag.classList.toggle("active", tag.dataset.status === (post.status || "").toLowerCase()));

      syncPriorityVisibility();
      renderCalendar();
      renderTodos();
      updateMetrics();
    }

    function bindPostInput(input, key) {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        currentPost()[key] = input.value;
        persist();
        render();
      });
    }

    buttons.forEach((btn) => btn.addEventListener("click", () => { state.brand = btn.dataset.brand; render(); }));

    [fields.priority1, fields.priority2, fields.priority3].forEach((input, index) => input.addEventListener("input", () => {
      setSavedLabel("Saving...");
      state.data[state.brand].priorities[index] = input.value;
      persist();
      syncPriorityVisibility();
    }));

    fields.notes.addEventListener("input", () => { setSavedLabel("Saving..."); state.data[state.brand].notes = fields.notes.value; persist(); });
    ["goal","audience","theme","kpiTarget"].forEach((key) => fields[key].addEventListener("input", () => {
      setSavedLabel("Saving...");
      state.data[state.brand].strategy[key] = fields[key].value;
      persist();
    }));

    fields.quickSearch.addEventListener("input", () => { state.filters.search = fields.quickSearch.value; render(); });
    fields.viewMode.addEventListener("change", () => { state.filters.compact = fields.viewMode.value === "compact"; render(); });

    platformPicker.querySelectorAll(".tag-chip").forEach((chip) => chip.addEventListener("click", () => {
      setSavedLabel("Saving...");
      const post = currentPost();
      const selected = Array.isArray(post.platforms) ? [...post.platforms] : [];
      const index = selected.indexOf(chip.dataset.platform);
      if (index >= 0) selected.splice(index, 1); else selected.push(chip.dataset.platform);
      post.platforms = selected;
      persist();
      render();
    }));

    todoList.addEventListener("input", (event) => {
      const text = event.target.closest("[data-todo-text]");
      const due = event.target.closest("[data-todo-due]");
      if (text) { const i = Number(text.dataset.todoText); state.data[state.brand].todos[i].text = text.value; }
      if (due) { const i = Number(due.dataset.todoDue); state.data[state.brand].todos[i].due = due.value; }
      setSavedLabel("Saving...");
      persist();
      updateMetrics();
    });

    todoList.addEventListener("change", (event) => {
      const check = event.target.closest("[data-todo-check]");
      const owner = event.target.closest("[data-todo-owner]");
      if (check) { const i = Number(check.dataset.todoCheck); state.data[state.brand].todos[i].done = check.checked; }
      if (owner) { const i = Number(owner.dataset.todoOwner); state.data[state.brand].todos[i].owner = owner.value; }
      setSavedLabel("Saving...");
      persist();
      render();
    });

    newTaskBtn.addEventListener("click", () => {
      state.data[state.brand].todos.push({ text: "", done: false, owner: "Marketing", due: "" });
      setSavedLabel("Saving...");
      persist();
      renderTodos();
    });

    statusPicker.querySelectorAll(".status-tag").forEach((tag) => tag.addEventListener("click", () => {
      currentPost().status = tag.dataset.status;
      fields.status.value = tag.dataset.status;
      setSavedLabel("Saving...");
      persist();
      render();
    }));

    document.getElementById("clearWeek").addEventListener("click", () => {
      state.data[state.brand] = emptyBrandState();
      state.selectedDay = "Monday";
      setSavedLabel("Saving...");
      persist();
      render();
    });

    closeModal.addEventListener("click", () => { editorModal.classList.remove("open"); editorModal.setAttribute("aria-hidden", "true"); });
    editorModal.addEventListener("click", (event) => { if (event.target === editorModal) { editorModal.classList.remove("open"); editorModal.setAttribute("aria-hidden", "true"); } });

    bindPostInput(fields.postTitle, "postTitle");
    bindPostInput(fields.time, "time");
    bindPostInput(fields.status, "status");
    bindPostInput(fields.caption, "caption");
    bindPostInput(fields.cta, "cta");
    bindPostInput(fields.asset, "asset");
    bindPostInput(fields.contentPillar, "contentPillar");

    document.addEventListener("keydown", (event) => {
      if (event.key === "/") { event.preventDefault(); fields.quickSearch.focus(); }
      if (event.key.toLowerCase() === "n") { openEditor(state.selectedDay); }
      if (event.key.toLowerCase() === "t") { newTaskBtn.click(); }
    });

    weekBadge.textContent = `Week of ${formatWeekOf()}`;
    load();
    render();
  </script>
</body>
</html>
