<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Social Media Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#00549A;
      --accent:#0070CA;
      --bg:#F9F9F7;
      --surface:rgba(255,255,255,.68);
      --border:rgba(148,163,184,.34);
      --text:#0F172A;
      --muted:#64748B;
      --shadow:0 24px 55px rgba(15,23,42,.14);
      --radius:18px;
      --font:"Inter","Helvetica Neue",Helvetica,Arial,sans-serif;
      --trans:all .22s ease;
    }

    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:var(--font);color:var(--text);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .container{max-width:1220px;margin:0 auto;padding:28px 20px 42px}

    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:20px;font-weight:600;line-height:1;box-shadow:0 8px 18px rgba(0,84,154,.22)}
    .brand-text{display:flex;flex-direction:column;line-height:1.3;min-width:0}
    .brand-text strong{font-size:15px;letter-spacing:.05em;text-transform:uppercase;font-weight:400;color:var(--text)}
    .brand-text span{font-size:13px;color:var(--muted);font-weight:400}

    .toggle{display:flex;gap:8px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;box-shadow:0 4px 12px rgba(15,23,42,.05)}
    .toggle button{border:0;background:transparent;border-radius:999px;padding:10px 16px;font:inherit;font-weight:500;color:var(--muted);cursor:pointer;transition:var(--trans)}
    .toggle button.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 7px 14px rgba(0,84,154,.22)}

    .panel{background:linear-gradient(145deg,rgba(255,255,255,.66),rgba(255,255,255,.36));backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px}
    .panel h2{margin:0 0 12px;font-size:1.02rem;font-weight:600;letter-spacing:-.01em}

    textarea,input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.78);font:inherit;color:var(--text);backdrop-filter:blur(8px)}
    textarea:focus,input:focus,select:focus{outline:2px solid rgba(0,112,202,.26);border-color:transparent}

    .meta-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .week-badge{font-size:.85rem;font-weight:500;color:#334155;background:rgba(148,163,184,.12);padding:6px 10px;border-radius:999px}
    .meta-actions{display:flex;gap:8px;align-items:center}
    .subtle-btn{border:1px solid var(--border);background:#fff;padding:8px 12px;border-radius:10px;font:inherit;font-weight:500;cursor:pointer;color:#334155}
    .saved-text{font-size:.82rem;color:var(--muted)}

    .priority-list{margin:0;padding-left:20px;display:grid;gap:8px}
    .priority-list li{padding-left:2px}
    .priority-list li.hidden{display:none}

    .resolved-toggle{border:0;background:transparent;color:#334155;font:inherit;font-size:.8rem;font-weight:600;cursor:pointer;padding:0}
    .resolved-list{display:none;gap:8px;margin-top:8px}
    .resolved-wrap.open .resolved-list{display:grid}
    .resolved-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border:1px solid rgba(148,163,184,.28);background:#fff;border-radius:10px;font-size:.82rem}
    .reopen-btn{border:1px solid rgba(0,112,202,.25);background:#f8fbff;color:#0f4d80;border-radius:999px;padding:4px 9px;font:inherit;font-size:.73rem;font-weight:600;cursor:pointer}
    .next-action{margin-top:10px;padding:11px;border:1px solid rgba(34,197,94,.28);background:linear-gradient(180deg,#f5fff7,#effcf2);border-radius:12px}
    .next-action strong{display:block;font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:#166534;margin-bottom:4px}
    .next-action p{margin:0;font-size:.88rem;color:#14532d}
    .status-picker{grid-column:1 / -1;display:flex;flex-wrap:wrap;gap:8px}
    .status-tag{border:1px solid transparent;border-radius:999px;padding:6px 10px;font:inherit;font-size:.75rem;font-weight:600;text-transform:capitalize;cursor:pointer;transition:var(--trans)}
    .status-tag[data-status="planned"]{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .status-tag[data-status="in progress"]{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
    .status-tag[data-status="posted"]{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .status-tag.active{box-shadow:inset 0 0 0 1px rgba(15,23,42,.2)}
    .tag-picker{grid-column:1 / -1;display:flex;flex-wrap:wrap;gap:8px}
    .tag-chip{border:1px solid rgba(148,163,184,.45);background:rgba(255,255,255,.72);border-radius:999px;padding:7px 11px;font:inherit;font-size:.78rem;font-weight:600;color:#334155;cursor:pointer;transition:var(--trans)}
    .tag-chip.active{background:linear-gradient(135deg,var(--primary),var(--accent));border-color:transparent;color:#fff;box-shadow:0 7px 14px rgba(0,84,154,.2)}
    .notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
    .todo-list{display:grid;gap:10px}
    .todo-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.62);border:1px solid rgba(148,163,184,.25)}
    .todo-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
    .todo-item input[type="text"]{border:0;background:transparent;padding:4px 0;min-width:0}
    .todo-item input[type="text"]:focus{outline:none}
    .todo-item.done input[type="text"]{text-decoration:line-through;color:var(--muted)}
    .new-task-btn{margin-top:4px;border:1px dashed rgba(100,116,139,.45);background:rgba(255,255,255,.74);border-radius:10px;padding:9px 12px;color:#334155;font:inherit;font-size:.84rem;font-weight:500;cursor:pointer;text-align:center}
    .new-task-btn:hover{border-color:rgba(0,112,202,.45);color:#1e3a5f}


    .main-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
    .calendar-board{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;background:linear-gradient(180deg,#f9fcff,#f2f7fd);padding:12px;border-radius:14px;border:1px solid rgba(148,163,184,.24)}
    .day{border:1px solid rgba(148,163,184,.25);background:#fff;border-radius:12px;padding:14px;min-height:168px;text-align:left;transition:var(--trans);display:flex;flex-direction:column;gap:10px}
    .day:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(15,23,42,.11)}
    .day.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,112,202,.16),0 14px 24px rgba(15,23,42,.08)}
    .day-name{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .post-tile{border:1px solid rgba(0,112,202,.24);background:linear-gradient(160deg,#0f4d80,#1c6aa8);border-radius:10px;padding:10px 11px;cursor:pointer;display:grid;gap:6px;text-align:left;color:#fff;box-shadow:0 10px 18px rgba(15,23,42,.14)}
    .post-tile.platform-linkedin{background:linear-gradient(160deg,#0A66C2,#004182)}
    .post-tile.platform-facebook{background:linear-gradient(160deg,#1877F2,#0f4fa6)}
    .post-tile.platform-instagram{background:linear-gradient(160deg,#F58529,#DD2A7B 55%,#8134AF)}
    .post-tile.status-planned{border-color:rgba(191,219,254,.95)}
    .post-tile.status-in-progress{border-color:rgba(253,186,116,.95)}
    .post-tile.status-posted{border-color:rgba(134,239,172,.95)}
    .post-tile:hover{border-color:rgba(0,112,202,.45)}
    .post-title{display:block;color:#fff;font-size:.84rem;line-height:1.35;font-weight:600}
    .post-meta{display:flex;justify-content:space-between;gap:8px;font-size:.74rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase;color:rgba(255,255,255,.88)}
    .post-status{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.68);border-radius:999px;padding:2px 8px;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:rgba(15,23,42,.14)}
    .add-post{margin-top:auto;border:1px dashed rgba(100,116,139,.45);background:rgba(248,250,252,.85);border-radius:10px;padding:9px 10px;color:#475569;font:inherit;font-size:.8rem;cursor:pointer;text-align:left}
    .add-post:hover{border-color:rgba(0,112,202,.45);color:#1e3a5f}
    
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}
    .modal.open{display:flex}
    .modal-card{width:min(680px,100%);max-height:90vh;overflow:auto;background:linear-gradient(165deg,rgba(255,255,255,.96),rgba(248,250,252,.97));border-radius:20px;padding:22px;border:1px solid rgba(148,163,184,.3);box-shadow:0 26px 48px rgba(15,23,42,.24)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(148,163,184,.25)}
    .modal-head h2{margin:0;font-size:1.12rem;letter-spacing:-.01em}
    .close-btn{border:0;background:#e2e8f0;border-radius:10px;width:34px;height:34px;font-size:1.1rem;cursor:pointer;color:#334155}

    .fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field-group{display:grid;gap:6px}
    .field-group label{font-size:.76rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#475569}
    .field-hint{margin:0;font-size:.78rem;color:#64748b;grid-column:1 / -1}
    .platform-block,.status-block{display:grid;gap:8px;padding:12px;border:1px solid rgba(148,163,184,.25);border-radius:12px;background:rgba(248,250,252,.7)}
    .platform-block strong,.status-block strong{font-size:.76rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#475569}
    .platform-block .tag-picker,.status-block .status-picker{margin:0}
    .full{grid-column:1 / -1}

    @media (max-width:1000px){
      .calendar-board{grid-template-columns:repeat(2,minmax(130px,1fr))}
    }

    @media (max-width:720px){
      .container{padding:20px 14px 110px}
      .toggle{width:100%}
      .toggle button{flex:1}
      .notes-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">IS</div>
        <div class="brand-text">
          <strong>Weekly Social Media Plan</strong>
          <span id="brandSubtitle">Integrated Staffing</span>
        </div>
      </div>
      <div class="toggle" role="tablist" aria-label="Staffing brand toggle">
        <button type="button" data-brand="is" class="active">IS</button>
        <button type="button" data-brand="as">AS</button>
        <button type="button" data-brand="ad">AD</button>
      </div>
    </header>

    <section class="panel">
      <div class="meta-row">
        <span class="week-badge" id="weekBadge">Week of --</span>
        <div class="meta-actions">
          <span id="saveState" class="saved-text">Saved</span>
          <button id="clearWeek" type="button" class="subtle-btn">Reset week</button>
        </div>
      </div>
      <h2>Priorities</h2>
      <ul class="priority-list">
        <li><input id="priority1" type="text" placeholder="Priority 1" /></li>
        <li id="priorityItem2" class="hidden"><input id="priority2" type="text" placeholder="Priority 2" /></li>
        <li id="priorityItem3" class="hidden"><input id="priority3" type="text" placeholder="Priority 3" /></li>
      </ul>
    </section>

    <section class="main-grid">
      <section class="panel">
        <h2>Calendar</h2>
        <div class="calendar-board" id="calendar"></div>
      </section>
    </section>

    <section class="notes-grid">
      <section class="panel">
        <h2>Notes</h2>
        <textarea id="notes" rows="7" placeholder="Notes"></textarea>
      </section>
      <section class="panel">
        <h2>To Do List</h2>
        <div class="todo-list" id="todoList"></div>
        <button type="button" class="new-task-btn" id="newTaskBtn">New task</button>
      </section>
    </section>

    <div class="modal" id="editorModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div class="modal-head">
          <h2 id="editorTitle">Post Details • Monday</h2>
          <button type="button" class="close-btn" id="closeModal" aria-label="Close post editor">×</button>
        </div>
        <div class="fields">
          <p class="field-hint">Add the essentials and your calendar card updates instantly.</p>
          <div class="field-group full">
            <label for="postTitle">Post title</label>
            <input id="postTitle" placeholder="What are you posting about?" />
          </div>
          <div class="platform-block full">
            <strong>Platform</strong>
            <div class="tag-picker" id="platformPicker" aria-label="Select post platforms">
              <button type="button" class="tag-chip" data-platform="LinkedIn">LinkedIn</button>
              <button type="button" class="tag-chip" data-platform="Facebook">Facebook</button>
              <button type="button" class="tag-chip" data-platform="Instagram">Instagram</button>
            </div>
          </div>
          <div class="field-group">
            <label for="time">Publish time</label>
            <input id="time" type="time" />
          </div>
          <input id="status" class="full" type="hidden" />
          <div class="status-block full">
            <strong>Status</strong>
            <div class="status-picker" id="statusPicker" aria-label="Post status">
              <button type="button" class="status-tag" data-status="planned">Planned</button>
              <button type="button" class="status-tag" data-status="in progress">In Progress</button>
              <button type="button" class="status-tag" data-status="posted">Posted</button>
            </div>
          </div>
          <div class="field-group full">
            <label for="caption">Caption draft</label>
            <textarea id="caption" rows="4" placeholder="Write your post copy here..."></textarea>
          </div>
          <div class="field-group full">
            <label for="postLink">Post URL</label>
            <input id="postLink" type="url" placeholder="https://..." />
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    const STORAGE_KEY = "weekly-social-plan-v2";

    const calendar = document.getElementById("calendar");
    const weekBadge = document.getElementById("weekBadge");
    const saveState = document.getElementById("saveState");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const brandMark = document.getElementById("brandMark");
    const editorModal = document.getElementById("editorModal");
    const closeModal = document.getElementById("closeModal");
    const buttons = document.querySelectorAll(".toggle button");
    const statusPicker = document.getElementById("statusPicker");
    const priorityItem2 = document.getElementById("priorityItem2");
    const priorityItem3 = document.getElementById("priorityItem3");
    const platformPicker = document.getElementById("platformPicker");
    const todoList = document.getElementById("todoList");
    const newTaskBtn = document.getElementById("newTaskBtn");

    const fields = {
      priority1: document.getElementById("priority1"),
      priority2: document.getElementById("priority2"),
      priority3: document.getElementById("priority3"),
      notes: document.getElementById("notes"),
      postTitle: document.getElementById("postTitle"),
      time: document.getElementById("time"),
      status: document.getElementById("status"),
      caption: document.getElementById("caption"),
      postLink: document.getElementById("postLink")
    };

    function emptyBrandState() {
      return { priorities: ["", "", ""], notes: "", todos: [{ text: "", done: false }], posts: {} };
    }

    const state = {
      brand: "is",
      selectedDay: "Monday",
      data: { is: emptyBrandState(), as: emptyBrandState(), ad: emptyBrandState() },
      quarter: null
    };

    function formatWeekOf(date = new Date()) {
      const day = date.getDay();
      const diffToMonday = (day + 6) % 7;
      const monday = new Date(date);
      monday.setDate(date.getDate() - diffToMonday);
      return monday.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function setSavedLabel(text) { saveState.textContent = text; }

    function currentPost() {
      const posts = state.data[state.brand].posts;
      if (!posts[state.selectedDay]) posts[state.selectedDay] = {};
      return posts[state.selectedDay];
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
      setSavedLabel("Saved");
    }

    function listItems(textOrArray) {
      if (Array.isArray(textOrArray)) return textOrArray.map((line) => String(line || "").trim()).filter(Boolean);
      return String(textOrArray || "").split(/\n+/).map((line) => line.replace(/^[-•\s]+/, "").trim()).filter(Boolean);
    }

    function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        ["is", "as", "ad"].forEach((brand) => {
          const source = parsed[brand] || {};
          const priorities = Array.isArray(source.priorities) ? source.priorities.slice(0, 3) : listItems(source.priorities).slice(0, 3);
          while (priorities.length < 3) priorities.push("");
          const todos = Array.isArray(source.todos) ? source.todos : [];
          if (todos.length === 0) todos.push({ text: "", done: false });
          state.data[brand] = {
            ...emptyBrandState(),
            ...source,
            priorities,
            todos: todos.map((todo) => ({ text: String((todo && todo.text) || ""), done: Boolean(todo && todo.done) }))
          };
        });
      } catch {
        console.warn("Unable to parse saved social plan data.");
      }
    }

    function openEditor(day) {
      state.selectedDay = day;
      editorModal.classList.add("open");
      editorModal.setAttribute("aria-hidden", "false");
      render();
    }

    function statusClass(status) {
      const normalized = String(status || "").toLowerCase().trim();
      if (normalized === "planned") return "status-planned";
      if (normalized === "in progress") return "status-in-progress";
      if (normalized === "posted") return "status-posted";
      return "";
    }

    function formatPlatforms(platforms) {
      if (Array.isArray(platforms)) return platforms.join(", ");
      return String(platforms || "").trim();
    }

    function platformClass(platforms) {
      const firstPlatform = Array.isArray(platforms) ? platforms[0] : String(platforms || "").split(",")[0];
      const normalized = String(firstPlatform || "").trim().toLowerCase();
      if (normalized === "linkedin") return "platform-linkedin";
      if (normalized === "facebook") return "platform-facebook";
      if (normalized === "instagram") return "platform-instagram";
      return "";
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      DAYS.forEach((day) => {
        const dayCard = document.createElement("article");
        dayCard.className = "day" + (day === state.selectedDay ? " active" : "");
        const post = state.data[state.brand].posts[day] || {};
        const hasPost = Boolean(post.postTitle);
        dayCard.innerHTML = `<span class="day-name">${day}</span>`;
        if (hasPost) {
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = `post-tile ${platformClass(post.platforms || post.platform)} ${statusClass(post.status)}`.trim();
          const statusLabel = String(post.status || "planned").trim() || "planned";
          tile.innerHTML = `<span class="post-title">${escapeHtml(post.postTitle)}</span><span class="post-meta"><span>${escapeHtml(formatPlatforms(post.platforms || post.platform) || "Set platform")}</span><span>${escapeHtml(post.time || "Set time")}</span></span><span class="post-status">${escapeHtml(statusLabel)}</span>`;
          tile.addEventListener("click", () => openEditor(day));
          dayCard.appendChild(tile);
        } else {
          const addButton = document.createElement("button");
          addButton.type = "button";
          addButton.className = "add-post";
          addButton.textContent = "Add post";
          addButton.addEventListener("click", () => openEditor(day));
          dayCard.appendChild(addButton);
        }
        calendar.appendChild(dayCard);
      });
    }

    function escapeHtml(text) {
      return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function syncPriorityVisibility() {
      const [p1, p2, p3] = state.data[state.brand].priorities.map((item) => String(item || "").trim());
      const showSecond = Boolean(p1 || p2 || p3);
      const showThird = Boolean(p2 || p3);
      priorityItem2.classList.toggle("hidden", !showSecond);
      priorityItem3.classList.toggle("hidden", !showThird);
    }

    function renderTodos() {
      const todos = state.data[state.brand].todos || [];
      todoList.innerHTML = "";
      todos.forEach((todo, index) => {
        const row = document.createElement("label");
        row.className = "todo-item" + (todo.done ? " done" : "");
        row.innerHTML = `<input type="checkbox" data-todo-check="${index}" ${todo.done ? "checked" : ""} /><input type="text" data-todo-text="${index}" placeholder="Task ${index + 1}" value="${escapeHtml(todo.text || "")}" />`;
        todoList.appendChild(row);
      });
    }

    function render() {
      const brandConfig = {
        is: { primary: "#00549A", accent: "#0070CA", subtitle: "Integrated Staffing", mark: "IS" },
        as: { primary: "#C77800", accent: "#F0A31A", subtitle: "Accountant Staffing", mark: "AS" },
        ad: { primary: "#21356e", accent: "#21356e", subtitle: "Administrative Staffing", mark: "AD" }
      };
      const currentBrand = brandConfig[state.brand] || brandConfig.is;
      document.documentElement.style.setProperty("--primary", currentBrand.primary);
      document.documentElement.style.setProperty("--accent", currentBrand.accent);
      brandSubtitle.textContent = currentBrand.subtitle;
      brandMark.textContent = currentBrand.mark;
      buttons.forEach((btn) => btn.classList.toggle("active", btn.dataset.brand === state.brand));

      const priorities = state.data[state.brand].priorities || ["", "", ""];
      fields.priority1.value = priorities[0] || "";
      fields.priority2.value = priorities[1] || "";
      fields.priority3.value = priorities[2] || "";
      fields.notes.value = state.data[state.brand].notes || "";
      syncPriorityVisibility();

      renderTodos();

      const post = currentPost();
      document.getElementById("editorTitle").textContent = `Post Details • ${state.selectedDay}`;
      ["postTitle","time","status","caption"].forEach((key) => { fields[key].value = post[key] || ""; });
      fields.postLink.value = post.postLink || post.asset || "";
      const selectedPlatforms = Array.isArray(post.platforms) ? post.platforms : (post.platform ? [post.platform] : []);
      platformPicker.querySelectorAll(".tag-chip").forEach((chip) => {
        chip.classList.toggle("active", selectedPlatforms.includes(chip.dataset.platform));
      });
      statusPicker.querySelectorAll(".status-tag").forEach((tag) => {
        tag.classList.toggle("active", tag.dataset.status === (post.status || "").toLowerCase());
      });

      renderCalendar();
    }

    function bindPostInput(input, key) {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        currentPost()[key] = input.value;
        persist();
        renderCalendar();
      });
    }

    buttons.forEach((btn) => btn.addEventListener("click", () => { state.brand = btn.dataset.brand; render(); }));

    [fields.priority1, fields.priority2, fields.priority3].forEach((input, index) => {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        state.data[state.brand].priorities[index] = input.value;
        persist();
        syncPriorityVisibility();
      });
    });

    fields.notes.addEventListener("input", () => {
      setSavedLabel("Saving...");
      state.data[state.brand].notes = fields.notes.value;
      persist();
    });


    platformPicker.querySelectorAll(".tag-chip").forEach((chip) => chip.addEventListener("click", () => {
      setSavedLabel("Saving...");
      const post = currentPost();
      const selectedPlatforms = Array.isArray(post.platforms) ? [...post.platforms] : (post.platform ? [post.platform] : []);
      const index = selectedPlatforms.indexOf(chip.dataset.platform);
      if (index >= 0) selectedPlatforms.splice(index, 1);
      else selectedPlatforms.push(chip.dataset.platform);
      post.platforms = selectedPlatforms;
      post.platform = selectedPlatforms.join(", ");
      persist();
      render();
    }));

    todoList.addEventListener("input", (event) => {
      const input = event.target.closest("[data-todo-text]");
      if (!input) return;
      const index = Number(input.dataset.todoText);
      if (Number.isNaN(index) || !state.data[state.brand].todos[index]) return;
      setSavedLabel("Saving...");
      state.data[state.brand].todos[index].text = input.value;
      persist();
    });

    todoList.addEventListener("change", (event) => {
      const check = event.target.closest("[data-todo-check]");
      if (!check) return;
      const index = Number(check.dataset.todoCheck);
      if (Number.isNaN(index) || !state.data[state.brand].todos[index]) return;
      setSavedLabel("Saving...");
      state.data[state.brand].todos[index].done = check.checked;
      renderTodos();
      persist();
    });

    newTaskBtn.addEventListener("click", () => {
      setSavedLabel("Saving...");
      state.data[state.brand].todos.push({ text: "", done: false });
      renderTodos();
      persist();
    });

    statusPicker.querySelectorAll(".status-tag").forEach((tag) => tag.addEventListener("click", () => {
      setSavedLabel("Saving...");
      currentPost().status = tag.dataset.status;
      fields.status.value = tag.dataset.status;
      persist();
      render();
    }));

    document.getElementById("clearWeek").addEventListener("click", () => {
      state.data[state.brand] = emptyBrandState();
      state.selectedDay = "Monday";
      persist();
      render();
    });

    closeModal.addEventListener("click", () => {
      editorModal.classList.remove("open");
      editorModal.setAttribute("aria-hidden", "true");
    });
    editorModal.addEventListener("click", (event) => {
      if (event.target === editorModal) {
        editorModal.classList.remove("open");
        editorModal.setAttribute("aria-hidden", "true");
      }
    });

    bindPostInput(fields.postTitle, "postTitle");
    bindPostInput(fields.time, "time");
    bindPostInput(fields.status, "status");
    bindPostInput(fields.caption, "caption");
    bindPostInput(fields.postLink, "postLink");

    weekBadge.textContent = `Week of ${formatWeekOf()}`;
    load();
    render();
  </script>

</body>
</html>
