<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Social Media Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#00549A;
      --accent:#0070CA;
      --bg:#F4F8FC;
      --surface:#FFFFFF;
      --border:rgba(15,23,42,.1);
      --text:#0F172A;
      --muted:#64748B;
      --shadow:0 14px 36px rgba(15,23,42,.11);
      --radius:18px;
      --font:"Inter","Helvetica Neue",Helvetica,Arial,sans-serif;
      --trans:all .22s ease;
    }

    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top,#f8fbff 0,#f1f6fc 42%,#edf3fb 100%);font-family:var(--font);color:var(--text);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .container{max-width:1220px;margin:0 auto;padding:28px 20px 42px}

    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:20px;font-weight:600;line-height:1;box-shadow:0 8px 18px rgba(0,84,154,.22)}
    .brand-text{display:flex;flex-direction:column;line-height:1.3;min-width:0}
    .brand-text strong{font-size:15px;letter-spacing:.05em;text-transform:uppercase;font-weight:400;color:var(--text)}
    .brand-text span{font-size:13px;color:var(--muted);font-weight:400}

    .toggle{display:flex;gap:8px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;box-shadow:0 4px 12px rgba(15,23,42,.05)}
    .toggle button{border:0;background:transparent;border-radius:999px;padding:10px 16px;font:inherit;font-weight:500;color:var(--muted);cursor:pointer;transition:var(--trans)}
    .toggle button.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 7px 14px rgba(0,84,154,.22)}

    .panel{background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.84));backdrop-filter:blur(12px) saturate(140%);-webkit-backdrop-filter:blur(12px) saturate(140%);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px}
    .panel h2{margin:0 0 12px;font-size:1.02rem;font-weight:600;letter-spacing:-.01em}

    textarea,input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;font:inherit;color:var(--text)}
    textarea:focus,input:focus,select:focus{outline:2px solid rgba(0,112,202,.26);border-color:transparent}

    .meta-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .week-badge{font-size:.85rem;font-weight:500;color:#334155;background:rgba(148,163,184,.12);padding:6px 10px;border-radius:999px}
    .meta-actions{display:flex;gap:8px;align-items:center}
    .subtle-btn{border:1px solid var(--border);background:#fff;padding:8px 12px;border-radius:10px;font:inherit;font-weight:500;cursor:pointer;color:#334155}
    .saved-text{font-size:.82rem;color:var(--muted)}

    .ai-panel{margin-top:16px}
    .ai-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .ai-kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
    .ai-refresh{border:1px solid var(--border);background:#fff;color:#334155;border-radius:999px;padding:6px 12px;font:inherit;font-size:.8rem;font-weight:500;cursor:pointer}
    .ai-list{display:grid;gap:10px}
    .ai-item{background:rgba(255,255,255,.8);border:1px solid rgba(148,163,184,.2);border-radius:12px;padding:12px 13px}
    .ai-item strong{display:block;font-size:.78rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
    .ai-item p{margin:0;font-size:.9rem;color:#1e293b;line-height:1.45}

    .main-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
    .calendar-board{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;background:linear-gradient(180deg,#f9fcff,#f2f7fd);padding:12px;border-radius:14px;border:1px solid rgba(148,163,184,.24)}
    .day{border:1px solid rgba(148,163,184,.25);background:#fff;border-radius:12px;padding:14px;min-height:168px;text-align:left;transition:var(--trans);display:flex;flex-direction:column;gap:10px}
    .day:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(15,23,42,.11)}
    .day.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,112,202,.16),0 14px 24px rgba(15,23,42,.08)}
    .day-name{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .post-tile{border:1px solid rgba(0,112,202,.2);background:linear-gradient(180deg,#ffffff,#f6fbff);border-radius:10px;padding:10px 11px;cursor:pointer;display:grid;gap:4px;text-align:left}
    .post-tile:hover{border-color:rgba(0,112,202,.45)}
    .post-title{display:block;color:#1e293b;font-size:.84rem;line-height:1.35;font-weight:500}
    .post-meta{display:flex;justify-content:space-between;gap:8px;font-size:.74rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase;color:#64748b}
    .add-post{margin-top:auto;border:1px dashed rgba(100,116,139,.45);background:rgba(248,250,252,.85);border-radius:10px;padding:9px 10px;color:#475569;font:inherit;font-size:.8rem;cursor:pointer;text-align:left}
    .add-post:hover{border-color:rgba(0,112,202,.45);color:#1e3a5f}
    
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}
    .modal.open{display:flex}
    .modal-card{width:min(620px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:16px;padding:20px;border:1px solid var(--border);box-shadow:0 24px 45px rgba(15,23,42,.28)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .close-btn{border:0;background:#e2e8f0;border-radius:10px;width:34px;height:34px;font-size:1.1rem;cursor:pointer;color:#334155}

    .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1 / -1}

    @media (max-width:1000px){
      .calendar-board{grid-template-columns:repeat(2,minmax(130px,1fr))}
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">IS</div>
        <div class="brand-text">
          <strong>Weekly Social Media Plan</strong>
          <span id="brandSubtitle">Integrated Staffing</span>
        </div>
      </div>
      <div class="toggle" role="tablist" aria-label="Staffing brand toggle">
        <button type="button" data-brand="is" class="active">IS</button>
        <button type="button" data-brand="as">AS</button>
      </div>
    </header>

    <section class="panel">
      <div class="meta-row">
        <span class="week-badge" id="weekBadge">Week of --</span>
        <div class="meta-actions">
          <span id="saveState" class="saved-text">Saved</span>
          <button id="clearWeek" type="button" class="subtle-btn">Reset week</button>
        </div>
      </div>
      <h2>Priorities</h2>
      <textarea id="priorities" rows="4" placeholder="Top priorities"></textarea>
    </section>

    <section class="main-grid">
      <section class="panel">
        <h2>Calendar</h2>
        <div class="calendar-board" id="calendar"></div>
      </section>
    </section>

    <section class="panel" style="margin-top:16px;">
      <h2>Notes</h2>
      <textarea id="notes" rows="5" placeholder="Notes"></textarea>
    </section>



    <section class="panel ai-panel">
      <div class="ai-head">
        <div>
          <div class="ai-kicker">Your Strategy Partner</div>
          <h2>Marketing Team Copilot</h2>
        </div>
        <button type="button" id="aiRefresh" class="ai-refresh">Refresh</button>
      </div>
      <div id="aiList" class="ai-list"></div>
    </section>

    <div class="modal" id="editorModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div class="modal-head">
          <h2 id="editorTitle">Post Details • Monday</h2>
          <button type="button" class="close-btn" id="closeModal" aria-label="Close post editor">×</button>
        </div>
        <div class="fields">
          <input id="postTitle" class="full" placeholder="Post title" />
          <select id="platform">
            <option value="">Platform</option>
            <option>LinkedIn</option>
            <option>Facebook</option>
            <option>Instagram</option>
          </select>
          <input id="time" type="time" />
          <input id="status" class="full" placeholder="Status" />
          <textarea id="caption" class="full" rows="4" placeholder="Caption"></textarea>
          <input id="cta" class="full" placeholder="CTA" />
          <input id="asset" class="full" placeholder="Asset link" />
        </div>
      </section>
    </div>
  </main>

  <script>
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    const STORAGE_KEY = "weekly-social-plan-v2";

    const calendar = document.getElementById("calendar");
    const weekBadge = document.getElementById("weekBadge");
    const saveState = document.getElementById("saveState");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const brandMark = document.getElementById("brandMark");
    const editorModal = document.getElementById("editorModal");
    const closeModal = document.getElementById("closeModal");
    const buttons = document.querySelectorAll(".toggle button");
    const aiList = document.getElementById("aiList");
    const aiRefresh = document.getElementById("aiRefresh");

    const fields = {
      priorities: document.getElementById("priorities"),
      notes: document.getElementById("notes"),
      postTitle: document.getElementById("postTitle"),
      platform: document.getElementById("platform"),
      time: document.getElementById("time"),
      status: document.getElementById("status"),
      caption: document.getElementById("caption"),
      cta: document.getElementById("cta"),
      asset: document.getElementById("asset")
    };

    const state = {
      brand: "is",
      selectedDay: "Monday",
      data: {
        is: { priorities: "", notes: "", posts: {} },
        as: { priorities: "", notes: "", posts: {} }
      },
      quarter: null
    };

    function formatWeekOf(date = new Date()) {
      const day = date.getDay();
      const diffToMonday = (day + 6) % 7;
      const monday = new Date(date);
      monday.setDate(date.getDate() - diffToMonday);
      return monday.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function setSavedLabel(text) {
      saveState.textContent = text;
    }

    function currentPost() {
      const posts = state.data[state.brand].posts;
      if (!posts[state.selectedDay]) posts[state.selectedDay] = {};
      return posts[state.selectedDay];
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
      setSavedLabel("Saved");
    }

    function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        state.data = {
          is: { ...state.data.is, ...(parsed.is || {}) },
          as: { ...state.data.as, ...(parsed.as || {}) }
        };
      } catch {
        console.warn("Unable to parse saved social plan data.");
      }
    }

    function openEditor(day) {
      state.selectedDay = day;
      editorModal.classList.add("open");
      editorModal.setAttribute("aria-hidden", "false");
      render();
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      DAYS.forEach((day) => {
        const dayCard = document.createElement("article");
        dayCard.className = "day" + (day === state.selectedDay ? " active" : "");
        const post = state.data[state.brand].posts[day] || {};
        const hasPost = Boolean(post.postTitle);

        dayCard.innerHTML = `<span class="day-name">${day}</span>`;

        if (hasPost) {
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = "post-tile";
          tile.innerHTML = `
            <span class="post-title">${escapeHtml(post.postTitle)}</span>
            <span class="post-meta">
              <span>${escapeHtml(post.platform || "Set platform")}</span>
              <span>${escapeHtml(post.time || "Set time")}</span>
            </span>
          `;
          tile.addEventListener("click", () => openEditor(day));
          dayCard.appendChild(tile);
        } else {
          const addButton = document.createElement("button");
          addButton.type = "button";
          addButton.className = "add-post";
          addButton.textContent = "Add post";
          addButton.addEventListener("click", () => openEditor(day));
          dayCard.appendChild(addButton);
        }

        calendar.appendChild(dayCard);
      });
    }

    closeModal.addEventListener("click", () => {
      editorModal.classList.remove("open");
      editorModal.setAttribute("aria-hidden", "true");
    });

    editorModal.addEventListener("click", (event) => {
      if (event.target === editorModal) {
        editorModal.classList.remove("open");
        editorModal.setAttribute("aria-hidden", "true");
      }
    });



    async function loadQuarterContext() {
      try {
        const response = await fetch("./2026q1/2026-q1.json");
        if (!response.ok) return;
        state.quarter = await response.json();
      } catch {
        state.quarter = null;
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function listItems(text) {
      return String(text || "")
        .split(/\n+/)
        .map((line) => line.replace(/^[-•\s]+/, "").trim())
        .filter(Boolean);
    }

    function renderAssistant() {
      const messages = [];
      const priorities = listItems(state.data[state.brand].priorities);
      const notes = listItems(state.data[state.brand].notes);
      const posts = state.data[state.brand].posts || {};
      const weekPosts = DAYS.map((day) => posts[day] || {});
      const scheduled = weekPosts.filter((post) => post.postTitle);
      const withCTA = scheduled.filter((post) => post.cta);
      const platformCounts = scheduled.reduce((acc, post) => {
        const key = (post.platform || "Unassigned").trim() || "Unassigned";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      const topPlannedPlatform = Object.entries(platformCounts).sort((a, b) => b[1] - a[1])[0]?.[0];

      messages.push({
        label: "Team Check-in",
        text: `Hey team — I reviewed this week's plan. Right now we have ${scheduled.length} planned post${scheduled.length === 1 ? "" : "s"}. Want me to pressure-test the mix for awareness, engagement, and conversion?`
      });

      priorities.forEach((item, index) => {
        messages.push({
          label: `Priority ${index + 1}`,
          text: `I like this direction: "${item}". If we were in a weekly standup, I'd ask: what's our success metric by Friday, and what is the one post concept most likely to move it?`
        });
      });

      notes.forEach((item, index) => {
        messages.push({
          label: `Note ${index + 1}`,
          text: `Good call capturing this: "${item}". To make it execution-ready, should we assign an owner, a deadline, and a clear outcome so nothing slips?`
        });
      });

      if (state.quarter?.overall) {
        const avgER = state.quarter.overall.avgengagementrate;
        const topPlatform = (state.quarter.platforms || []).slice().sort((a,b)=>b.engagementRate-a.engagementRate)[0];
        const topPlatformName = topPlatform?.name || "LinkedIn";

        messages.push({
          label: "Quarter Strategy Link",
          text: `Quarter context: average engagement rate was ${avgER}%, with ${topPlatformName} leading. Do we want this week to deliberately lean into ${topPlatformName}${topPlannedPlatform && topPlannedPlatform !== "Unassigned" ? ` (currently most planned: ${topPlannedPlatform})` : ""} and then run one measured test on a secondary platform?`
        });

        const notWorking = state.quarter.insights?.notWorking;
        if (notWorking) {
          messages.push({
            label: "What We Should Fix",
            text: `One thing flagged last quarter: ${notWorking} I'd recommend one focused experiment this week tied to that gap, with a single success KPI so we can learn fast.`
          });
        }
      }

      if (scheduled.length < 3) {
        messages.push({
          label: "Content Cadence",
          text: "I'd push us to schedule at least 3 posts this week: one trust-building story, one value/education piece, and one conversion-focused post with a clear next step. Want me to draft that mix?"
        });
      }

      if (scheduled.length && withCTA.length < scheduled.length) {
        messages.push({
          label: "Performance Lens",
          text: "Some posts are still missing CTAs. If we tighten those, we can tie weekly execution back to quarterly growth goals much more confidently."
        });
      }

      if (!priorities.length && !notes.length && !scheduled.length) {
        messages.push({
          label: "Kickoff Prompt",
          text: "Drop your first priority and I'll help shape messaging angles, platform choices, and a practical execution plan like we’re collaborating in a planning meeting."
        });
      }

      aiList.innerHTML = messages.slice(0, 10).map((message) => `
        <article class="ai-item">
          <strong>${escapeHtml(message.label)}</strong>
          <p>${escapeHtml(message.text)}</p>
        </article>
      `).join("");
    }

    function render() {
      const integrated = state.brand === "is";
      document.documentElement.style.setProperty("--primary", integrated ? "#00549A" : "#C77800");
      document.documentElement.style.setProperty("--accent", integrated ? "#0070CA" : "#F0A31A");
      brandSubtitle.textContent = integrated ? "Integrated Staffing" : "Accountant Staffing / Administrative Staffing";
      brandMark.textContent = integrated ? "IS" : "AS";

      buttons.forEach((btn) => btn.classList.toggle("active", btn.dataset.brand === state.brand));

      fields.priorities.value = state.data[state.brand].priorities || "";
      fields.notes.value = state.data[state.brand].notes || "";

      const post = currentPost();
      document.getElementById("editorTitle").textContent = `Post Details • ${state.selectedDay}`;
      ["postTitle","platform","time","status","caption","cta","asset"].forEach((key) => {
        fields[key].value = post[key] || "";
      });

      renderCalendar();
      renderAssistant();
    }

    function bindGlobalInput(input, key) {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        state.data[state.brand][key] = input.value;
        persist();
        renderAssistant();
      });
    }

    function bindPostInput(input, key) {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        currentPost()[key] = input.value;
        persist();
        renderCalendar();
      });
    }

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        state.brand = btn.dataset.brand;
        render();
      });
    });

    aiRefresh.addEventListener("click", () => {
      renderAssistant();
    });

    document.getElementById("clearWeek").addEventListener("click", () => {
      state.data[state.brand] = { priorities: "", notes: "", posts: {} };
      state.selectedDay = "Monday";
      persist();
      render();
    });

    bindGlobalInput(fields.priorities, "priorities");
    bindGlobalInput(fields.notes, "notes");
    bindPostInput(fields.postTitle, "postTitle");
    bindPostInput(fields.platform, "platform");
    bindPostInput(fields.time, "time");
    bindPostInput(fields.status, "status");
    bindPostInput(fields.caption, "caption");
    bindPostInput(fields.cta, "cta");
    bindPostInput(fields.asset, "asset");

    weekBadge.textContent = `Week of ${formatWeekOf()}`;
    load();
    loadQuarterContext().finally(() => render());
  </script>
</body>
</html>
