<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Social Media Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#00549A;
      --accent:#0070CA;
      --brand-bg:rgba(0,84,154,.10);
      --bg:#F5F8FC;
      --card:#fff;
      --text:#0F172A;
      --muted:#64748B;
      --border:rgba(15,23,42,.1);
      --shadow:0 14px 34px rgba(15,23,42,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Inter",system-ui,sans-serif;background:linear-gradient(180deg,#f8fbff,#f1f6fc);color:var(--text)}
    .container{max-width:1200px;margin:0 auto;padding:28px 20px 44px}
    .topbar{display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;margin-bottom:20px}
    .brand{display:flex;align-items:center;gap:12px}
    .mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 8px 22px color-mix(in oklab,var(--primary),#000 16%)}
    h1{font-size:clamp(1.3rem,2.1vw,2rem);margin:0}
    .subtitle{margin:2px 0 0;color:var(--muted);font-size:.95rem}
    .toggle{background:var(--card);border:1px solid var(--border);padding:6px;border-radius:999px;display:flex;gap:8px;box-shadow:0 3px 10px rgba(15,23,42,.06)}
    .toggle button{border:0;background:transparent;padding:10px 16px;border-radius:999px;font-weight:700;color:var(--muted);cursor:pointer}
    .toggle button.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 8px 20px color-mix(in oklab,var(--primary),#000 18%)}

    .grid{display:grid;gap:16px}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
    .panel h2{margin:0 0 12px;font-size:1.03rem}
    textarea,input,select{width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font:inherit;background:#fff}
    textarea:focus,input:focus,select:focus{outline:2px solid color-mix(in oklab,var(--accent),#fff 75%);border-color:transparent}

    .layout{display:grid;grid-template-columns:1.2fr 1fr;gap:16px}
    .calendar{display:grid;grid-template-columns:repeat(7,minmax(90px,1fr));gap:10px}
    .day{border:1px solid var(--border);border-radius:12px;padding:12px;min-height:110px;background:#fff;cursor:pointer;transition:.18s}
    .day:hover{transform:translateY(-1px);box-shadow:0 10px 18px rgba(15,23,42,.08)}
    .day.active{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in oklab,var(--accent),#fff 72%)}
    .day strong{display:block;font-size:.9rem;margin-bottom:8px}
    .mini{font-size:.8rem;color:var(--muted);line-height:1.35}

    .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fields .full{grid-column:1/-1}

    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
      .calendar{grid-template-columns:repeat(2,minmax(120px,1fr))}
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div class="brand">
        <div class="mark" id="brandMark">IS</div>
        <div>
          <h1>Weekly Social Media Plan</h1>
          <p class="subtitle" id="brandSubtitle">Integrated Staffing</p>
        </div>
      </div>
      <div class="toggle" role="tablist" aria-label="Staffing brand toggle">
        <button type="button" class="active" data-brand="is">Integrated Staffing</button>
        <button type="button" data-brand="as">Accountant/Admin Staffing</button>
      </div>
    </div>

    <section class="panel">
      <h2>Weekly Priorities</h2>
      <textarea id="priorities" rows="4" placeholder="Example: highlight hard-to-fill roles, promote client testimonial, and post a recruiter spotlight."></textarea>
    </section>

    <section class="layout" style="margin-top:16px;">
      <div class="panel">
        <h2>Week Calendar</h2>
        <div class="calendar" id="calendar"></div>
      </div>

      <div class="panel">
        <h2 id="editorTitle">Post Details • Monday</h2>
        <div class="fields">
          <input id="postTitle" placeholder="Post title" class="full" />
          <select id="platform">
            <option value="">Platform</option>
            <option>LinkedIn</option>
            <option>Facebook</option>
            <option>Instagram</option>
            <option>X / Twitter</option>
          </select>
          <input id="time" type="time" />
          <input id="status" placeholder="Goal / status (e.g., draft, scheduled)" class="full" />
          <textarea id="caption" rows="4" placeholder="Caption / copy" class="full"></textarea>
          <input id="cta" placeholder="Call-to-action" class="full" />
          <input id="asset" placeholder="Asset or link reference" class="full" />
        </div>
      </div>
    </section>

    <section class="panel" style="margin-top:16px;">
      <h2>Notes</h2>
      <textarea id="notes" rows="5" placeholder="Campaign notes, approvals needed, ideas for next week..."></textarea>
    </section>
  </main>

  <script>
    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    const calendar = document.getElementById("calendar");
    const toggleButtons = document.querySelectorAll(".toggle button");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const brandMark = document.getElementById("brandMark");

    const fields = {
      priorities: document.getElementById("priorities"),
      notes: document.getElementById("notes"),
      postTitle: document.getElementById("postTitle"),
      platform: document.getElementById("platform"),
      time: document.getElementById("time"),
      status: document.getElementById("status"),
      caption: document.getElementById("caption"),
      cta: document.getElementById("cta"),
      asset: document.getElementById("asset")
    };

    let state = {
      brand: "is",
      selectedDay: "Monday",
      data: { is: { priorities:"", notes:"", posts:{} }, as: { priorities:"", notes:"", posts:{} } }
    };

    const STORAGE_KEY = "weekly-social-plan-v1";

    function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { state.data = { ...state.data, ...JSON.parse(saved) }; } catch {}
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function currentPost() {
      const posts = state.data[state.brand].posts;
      if (!posts[state.selectedDay]) posts[state.selectedDay] = {};
      return posts[state.selectedDay];
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      days.forEach(day => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "day" + (day === state.selectedDay ? " active" : "");
        const post = state.data[state.brand].posts[day] || {};
        card.innerHTML = `<strong>${day}</strong><div class="mini">${post.postTitle || "No post planned"}</div><div class="mini">${post.platform || ""}</div>`;
        card.addEventListener("click", () => {
          state.selectedDay = day;
          render();
        });
        calendar.appendChild(card);
      });
    }

    function bindInput(input, key, scope="post") {
      input.addEventListener("input", () => {
        if (scope === "global") {
          state.data[state.brand][key] = input.value;
        } else {
          currentPost()[key] = input.value;
          renderCalendar();
        }
        persist();
      });
    }

    function render() {
      const isBrand = state.brand === "is";
      document.documentElement.style.setProperty("--primary", isBrand ? "#00549A" : "#C77800");
      document.documentElement.style.setProperty("--accent", isBrand ? "#0070CA" : "#F0A31A");
      brandSubtitle.textContent = isBrand ? "Integrated Staffing" : "Accountant Staffing / Administrative Staffing";
      brandMark.textContent = isBrand ? "IS" : "AS";

      toggleButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.brand === state.brand));
      fields.priorities.value = state.data[state.brand].priorities || "";
      fields.notes.value = state.data[state.brand].notes || "";

      const post = currentPost();
      document.getElementById("editorTitle").textContent = `Post Details • ${state.selectedDay}`;
      ["postTitle","platform","time","status","caption","cta","asset"].forEach(key => {
        fields[key].value = post[key] || "";
      });

      renderCalendar();
    }

    toggleButtons.forEach(btn => btn.addEventListener("click", () => {
      state.brand = btn.dataset.brand;
      render();
    }));

    bindInput(fields.priorities, "priorities", "global");
    bindInput(fields.notes, "notes", "global");
    bindInput(fields.postTitle, "postTitle");
    bindInput(fields.platform, "platform");
    bindInput(fields.time, "time");
    bindInput(fields.status, "status");
    bindInput(fields.caption, "caption");
    bindInput(fields.cta, "cta");
    bindInput(fields.asset, "asset");

    load();
    render();
  </script>
</body>
</html>
