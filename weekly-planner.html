  <button type="button" id="themeToggle" class="theme-toggle-fab" aria-pressed="false" aria-label="Toggle dark mode"><span id="themeToggleIcon" aria-hidden="true">🌙</span><span id="themeToggleLabel">Dark mode</span></button>

  <script>
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    const STORAGE_KEY = "weekly-planner-v5";
    const BRANDS = ["is", "as", "ad"];
    const DAY_CAL_START_MIN = 7 * 60;   // 7:00 AM
    const DAY_CAL_END_MIN   = 20 * 60;  // 8:00 PM
    const PX_PER_MIN        = 1;        // 1px = 1 min → 60px/hour
    const SNAP_MIN          = 15;       // snap to 15-min grid
    const BLOCK_COLORS      = ["blue","green","amber","red","purple","slate"];
    const DEFAULT_BLOCK_COLOR = "blue";

    const calendar = document.getElementById("calendar");
    const weekBadge = document.getElementById("weekBadge");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const brandMark = document.getElementById("brandMark");
    const editorModal = document.getElementById("editorModal");
    const closeModal = document.getElementById("closeModal");
    const projectModal = document.getElementById("projectModal");
    const closeProjectModal = document.getElementById("closeProjectModal");
    const todoModal = document.getElementById("todoModal");
    const closeTodoModal = document.getElementById("closeTodoModal");
    const deleteTodoTaskBtn = document.getElementById("deleteTodoTaskBtn");
    const recurringToggle = document.getElementById("recurringToggle");
    const recurringContent = document.getElementById("recurringContent");
    const buttons = document.querySelectorAll(".toggle button");
    const statusPicker = document.getElementById("statusPicker");
    const priorityItem2 = document.getElementById("priorityItem2");
    const priorityItem3 = document.getElementById("priorityItem3");
    const platformPicker = document.getElementById("platformPicker");
    const todoList = document.getElementById("todoList");
    const newTaskBtn = document.getElementById("newTaskBtn");
    const recurringList = document.getElementById("recurringList");
    const recurringAddBtn = document.getElementById("recurringAddBtn");
    const prioritiesContent = document.getElementById("prioritiesContent");
    const todosContent = document.getElementById("todosContent");
    const projectsContent = document.getElementById("projectsContent");
    const prioritiesToggle = document.getElementById("prioritiesToggle");
    const todosToggle = document.getElementById("todosToggle");
    const projectsToggle = document.getElementById("projectsToggle");
    const projectGrid = document.getElementById("projectGrid");
    const projectTodoList = document.getElementById("projectTodoList");
    const newProjectTaskBtn = document.getElementById("newProjectTaskBtn");
    const deleteProjectBtn = document.getElementById("deleteProjectBtn");
    const projectStatusOptions = document.getElementById("projectStatusOptions");
    const calendarAddBtn = document.getElementById("calendarAddBtn");
    const calendarPlatformFilter = document.getElementById("calendarPlatformFilter");
    const calendarStatusFilter = document.getElementById("calendarStatusFilter");
    const themeToggle = document.getElementById("themeToggle");
    const themeToggleLabel = document.getElementById("themeToggleLabel");
    const themeToggleIcon = document.getElementById("themeToggleIcon");
    const THEME_STORAGE_KEY = "weekly-planner-theme";


    const fields = {
      priority1: document.getElementById("priority1"),
      priority2: document.getElementById("priority2"),
      priority3: document.getElementById("priority3"),
      postTitle: document.getElementById("postTitle"),
      postDay: document.getElementById("postDay"),
      time: document.getElementById("time"),
      status: document.getElementById("status"),
      postType: document.getElementById("postType"),
      caption: document.getElementById("caption"),
      postLink: document.getElementById("postLink"),
      objective: document.getElementById("objective"),
      kpiTarget: document.getElementById("kpiTarget"),
      projectName: document.getElementById("projectName"),
      projectDeadline: document.getElementById("projectDeadline"),
      todoName: document.getElementById("todoName"),
      todoPriority: document.getElementById("todoPriority"),
      todoProject: document.getElementById("todoProject")
    };


    const dragState = { fromDay: null, fromIndex: null };
    function makeId(prefix = "item") {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function emptyBrandState() {
      return {
        priorities: ["", "", ""],
        todos: [{ text: "", done: false, priority: "medium", projectId: "" }],
        recurringTasks: [{ text: "", done: false, frequency: "weekly", dueDate: "", timePeriod: "anytime", status: "in progress" }],
        projects: [],
        posts: {},
        daySchedule: {}
      };
    }

    const state = {
      brand: "is",
      calBrand: "is",
      selectedDay: "Monday",
      selectedPostIndex: 0,
      selectedProjectIndex: null,
      selectedRecurringIndex: null,
      selectedTodoIndex: null,
      data: { is: emptyBrandState(), as: emptyBrandState(), ad: emptyBrandState() },
      panelOpen: {
        is: { priorities: null, todos: null, projects: null, recurring: true },
        as: { priorities: null, todos: null, projects: null, recurring: true },
        ad: { priorities: null, todos: null, projects: null, recurring: true }
      },
      dayCalDate: null,
      quarter: null,
      filters: { platform: "all", status: "all" }
    };
    let selectedBlockIdx = null;
    let outlookEvents = [];
    let msalApp = null;
    let restoreFocusTo = null;

    function weekContext(date = new Date()) {
      const day = date.getDay();
      const diffToMonday = (day + 6) % 7;
      const monday = new Date(date);
      monday.setHours(0,0,0,0);
      monday.setDate(date.getDate() - diffToMonday);

      const datesByDay = {};
      DAYS.forEach((dayName, index) => {
        const current = new Date(monday);
        current.setDate(monday.getDate() + index);
        datesByDay[dayName] = current;
      });

      const activeWeekday = day >= 1 && day <= 5 ? DAYS[day - 1] : null;

      return {
        monday,
        datesByDay,
        activeWeekday
      };
    }

    function formatWeekOf(date = new Date()) {
      const { monday } = weekContext(date);
      return monday.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function setSavedLabel() {}

    function dayPosts(day = state.selectedDay) {
      const posts = state.data[state.calBrand].posts;
      const existing = posts[day];
      if (Array.isArray(existing)) return existing;
      if (existing && typeof existing === "object") {
        posts[day] = [existing];
        return posts[day];
      }
      posts[day] = [];
      return posts[day];
    }

    function currentPost(createIfMissing = true) {
      const postsForDay = dayPosts();
      if (!postsForDay[state.selectedPostIndex]) {
        if (!createIfMissing) return {};
        postsForDay[state.selectedPostIndex] = {};
      }
      return postsForDay[state.selectedPostIndex];
    }

    function normalizePosts(posts) {
      const normalized = {};
      DAYS.forEach((day) => {
        const value = posts && posts[day];
        if (Array.isArray(value)) normalized[day] = value.filter((item) => item && typeof item === "object");
        else if (value && typeof value === "object") normalized[day] = [value];
        else normalized[day] = [];
      });
      return normalized;
    }

    function getWeekKey(date = new Date()) {
      const { monday } = weekContext(date);
      const year = monday.getFullYear();
      const month = String(monday.getMonth() + 1).padStart(2, "0");
      const day = String(monday.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function readSavedState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      try {
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        console.warn("Saved planner data was corrupted and could not be parsed.");
        return {};
      }
    }

    function normalizeSharedBrand(source) {
      const projects = Array.isArray(source.projects) ? source.projects.map((project) => ({
        id: String((project && project.id) || makeId("project")),
        name: String((project && project.name) || ""),
        status: normalizeProjectStatus((project && project.status) || "in progress"),
        deadline: String((project && project.deadline) || "")
      })) : [];
      const projectIds = new Set(projects.map((project) => project.id));
      const todos = Array.isArray(source.todos) ? [...source.todos] : [];

      projects.forEach((project, projectIndex) => {
        const legacyTodos = Array.isArray(source.projects && source.projects[projectIndex] && source.projects[projectIndex].todos)
          ? source.projects[projectIndex].todos
          : [];
        legacyTodos.forEach((todo) => {
          if (!todo || typeof todo !== "object") return;
          todos.push({ text: todo.text || "", done: Boolean(todo.done), priority: "medium", projectId: project.id });
        });
      });

      if (todos.length === 0) todos.push({ text: "", done: false, priority: "medium", projectId: "" });
      const recurringTasks = Array.isArray(source.recurringTasks) ? source.recurringTasks : [];
      if (recurringTasks.length === 0) recurringTasks.push({ text: "", done: false, frequency: "weekly", dueDate: "", timePeriod: "anytime", status: "in progress" });
      return {
        todos: todos.map((todo) => ({
          text: String((todo && todo.text) || ""),
          done: Boolean(todo && todo.done),
          priority: normalizeTodoPriority(todo && todo.priority),
          projectId: projectIds.has(String(todo && todo.projectId || "")) ? String(todo && todo.projectId || "") : ""
        })),
        recurringTasks: recurringTasks.map((task) => ({
          text: String((task && task.text) || ""),
          done: Boolean(task && task.done),
          frequency: normalizeRecurringFrequency(task && task.frequency),
          dueDate: String((task && task.dueDate) || ""),
          timePeriod: normalizeRecurringPeriod(task && task.timePeriod),
          status: normalizeRecurringStatus(task && task.status)
        })),
        projects,
        daySchedule: normalizeDaySchedule(source.daySchedule)
      };
    }

    function normalizeDaySchedule(raw) {
      if (!raw || typeof raw !== "object") return {};
      return Object.fromEntries(Object.entries(raw).map(([k, arr]) => [k,
        Array.isArray(arr) ? arr.map((b) => ({
          id: String(b.id || makeId("block")),
          title: String(b.title || ""),
          startMin: (typeof b.startMin === "number") ? b.startMin : 9 * 60,
          durationMin: (typeof b.durationMin === "number" && b.durationMin >= 15) ? b.durationMin : 60,
          color: BLOCK_COLORS.includes(b.color) ? b.color : DEFAULT_BLOCK_COLOR,
          note: String(b.note || ""),
          ...(b.outlookEventId ? { outlookEventId: String(b.outlookEventId) } : {})
        })) : []
      ]));
    }

    function normalizeWeeklyBrand(source) {
      const priorities = Array.isArray(source.priorities) ? source.priorities.slice(0, 3) : listItems(source.priorities).slice(0, 3);
      while (priorities.length < 3) priorities.push("");
      return { priorities, posts: normalizePosts(source.posts) };
    }

    function withinCurrentWeek(dateValue) {
      if (!dateValue) return null;
      const date = new Date(`${dateValue}T00:00:00`);
      if (Number.isNaN(date.getTime())) return null;
      const { monday } = weekContext();
      const weekStart = new Date(monday);
      const weekEnd = new Date(monday);
      weekEnd.setDate(weekStart.getDate() + 6);
      if (date < weekStart) return "overdue";
      if (date <= weekEnd) return "week";
      return null;
    }

    function persist() {
      const existing = readSavedState();
      const weekKey = getWeekKey();
      const shared = existing.shared && typeof existing.shared === "object" ? existing.shared : {};
      const weeks = existing.weeks && typeof existing.weeks === "object" ? existing.weeks : {};
      const weekData = weeks[weekKey] && typeof weeks[weekKey] === "object" ? weeks[weekKey] : {};

      BRANDS.forEach((brand) => {
        const brandState = state.data[brand] || emptyBrandState();
        const normalizedShared = normalizeSharedBrand(brandState);
        const normalizedWeekly = normalizeWeeklyBrand(brandState);
        shared[brand] = normalizedShared;
        weekData[brand] = normalizedWeekly;
      });

      weeks[weekKey] = weekData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ shared, weeks }));
      setSavedLabel("Saved");
    }

    function listItems(textOrArray) {
      if (Array.isArray(textOrArray)) return textOrArray.map((line) => String(line || "").trim()).filter(Boolean);
      return String(textOrArray || "").split(/\n+/).map((line) => line.replace(/^[-•\s]+/, "").trim()).filter(Boolean);
    }

    function load() {
      const parsed = readSavedState();
      if (!Object.keys(parsed).length) return;
      try {
        const weekKey = getWeekKey();
        const sharedRoot = parsed.shared && typeof parsed.shared === "object" ? parsed.shared : null;
        const weekRoot = parsed.weeks && parsed.weeks[weekKey] && typeof parsed.weeks[weekKey] === "object" ? parsed.weeks[weekKey] : null;
        const legacyState = (!sharedRoot && !weekRoot) ? (parsed[weekKey] || parsed) : null;

        BRANDS.forEach((brand) => {
          const sharedSource = sharedRoot ? (sharedRoot[brand] || {}) : (legacyState ? legacyState[brand] || {} : {});
          const weeklySource = weekRoot ? (weekRoot[brand] || {}) : (legacyState ? legacyState[brand] || {} : {});
          state.data[brand] = {
            ...emptyBrandState(),
            ...normalizeSharedBrand(sharedSource),
            ...normalizeWeeklyBrand(weeklySource)
          };
        });
      } catch {
        console.warn("Unable to parse saved social plan data.");
      }
    }

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark-mode", isDark);
      themeToggle.setAttribute("aria-pressed", String(isDark));
      themeToggleLabel.textContent = isDark ? "Light mode" : "Dark mode";
      themeToggleIcon.textContent = isDark ? "☀️" : "🌙";
    }

    function loadThemePreference() {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      applyTheme(savedTheme === "dark" ? "dark" : "light");
    }

    function openEditor(day, postIndex = null) {
      restoreFocusTo = document.activeElement;
      state.selectedDay = day;
      if (postIndex == null) state.selectedPostIndex = dayPosts(day).length;
      else state.selectedPostIndex = postIndex;
      editorModal.classList.add("open");
      editorModal.setAttribute("aria-hidden", "false");
      render();
      setTimeout(() => fields.postTitle.focus(), 0);
    }



    function statusClass(status) {
      const normalized = String(status || "").toLowerCase().trim();
      if (normalized === "planned") return "status-planned";
      if (normalized === "scheduled") return "status-scheduled";
      if (normalized === "in progress") return "status-in-progress";
      if (normalized === "posted") return "status-posted";
      return "";
    }

    function postTypeClass(postType) {
      return `post-type-${String(postType || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, "-")}`;
    }

    function platformIcons(platforms) {
      const selected = Array.isArray(platforms)
        ? platforms
        : String(platforms || "").split(",").map((item) => item.trim()).filter(Boolean);
      return selected.map((platform) => {
        const key = String(platform).toLowerCase();
        if (key === "linkedin") return '<span class="platform-icon" title="LinkedIn" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.94 8.5H3.56V19h3.38V8.5Zm.24-3.24a1.95 1.95 0 1 0-3.9 0 1.95 1.95 0 0 0 3.9 0ZM20.72 12.96c0-3.17-1.69-4.65-3.95-4.65-1.82 0-2.63 1-3.09 1.7V8.5h-3.37V19h3.37v-5.2c0-1.37.26-2.7 1.96-2.7 1.68 0 1.7 1.57 1.7 2.8V19h3.38l.01-6.04Z"/></svg></span>';
        if (key === "facebook") return '<span class="platform-icon" title="Facebook" aria-label="Facebook"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13.35 20v-7.28h2.45l.37-2.84h-2.82V8.06c0-.83.23-1.39 1.42-1.39h1.51V4.13A20.4 20.4 0 0 0 14.58 4c-2.18 0-3.67 1.33-3.67 3.78v2.1H8.44v2.84h2.47V20h2.44Z"/></svg></span>';
        if (key === "instagram") return '<span class="platform-icon" title="Instagram" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.8"/><circle cx="17.6" cy="6.4" r="1" fill="currentColor" stroke="none"/></svg></span>';
        return "";
      }).join("");
    }

    function formatPlatforms(platforms) {
      if (Array.isArray(platforms)) return platforms.join(", ");
      return String(platforms || "").trim();
    }

    function platformClass(platforms) {
      const firstPlatform = Array.isArray(platforms) ? platforms[0] : String(platforms || "").split(",")[0];
      const normalized = String(firstPlatform || "").trim().toLowerCase();
      if (normalized === "linkedin") return "platform-linkedin";
      if (normalized === "facebook") return "platform-facebook";
      if (normalized === "instagram") return "platform-instagram";
      return "";
    }

    /* ────────── Day Planner helpers ────────── */
    function getTodayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function minToY(min) { return (min - DAY_CAL_START_MIN) * PX_PER_MIN; }

    function yToSnappedMin(y) {
      const raw = y / PX_PER_MIN + DAY_CAL_START_MIN;
      return Math.max(DAY_CAL_START_MIN, Math.min(DAY_CAL_END_MIN - SNAP_MIN, Math.round(raw / SNAP_MIN) * SNAP_MIN));
    }

    function fmtMin(min) {
      const h = Math.floor(min / 60), m = min % 60;
      const h12 = h % 12 || 12, ampm = h < 12 ? "am" : "pm";
      return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2,"0")}${ampm}`;
    }

    function fmtDur(min) {
      if (min < 60) return `${min}m`;
      const h = Math.floor(min / 60), m = min % 60;
      return m ? `${h}h ${m}m` : `${h}h`;
    }

    function fmtDayLabel(key) {
      if (!key) return "Today";
      const [y, mo, d] = key.split("-").map(Number);
      const date = new Date(y, mo - 1, d);
      const today = new Date(); today.setHours(0,0,0,0);
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      if (date.toDateString() === today.toDateString()) return "Today";
      if (date.toDateString() === tomorrow.toDateString()) return "Tomorrow";
      if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
      return date.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    }

    function shiftDayCalDate(delta) {
      const key = state.dayCalDate || getTodayKey();
      const [y, mo, d] = key.split("-").map(Number);
      const date = new Date(y, mo - 1, d);
      date.setDate(date.getDate() + delta);
      state.dayCalDate = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
      outlookEvents = [];
      renderDailyCalendar();
      if (getGraphAccount()) fetchOutlookEventsForDay(state.dayCalDate);
    }

    function getDaySchedule() {
      const bd = state.data[state.brand];
      if (!bd.daySchedule || typeof bd.daySchedule !== "object") bd.daySchedule = {};
      const key = state.dayCalDate || getTodayKey();
      if (!Array.isArray(bd.daySchedule[key])) bd.daySchedule[key] = [];
      return bd.daySchedule[key];
    }

    /* ────────── Day Planner render ────────── */
    function renderDailyCalendar() {
      const timeGrid = document.getElementById("timeGrid");
      if (!timeGrid) return;
      const key = state.dayCalDate || getTodayKey();
      document.getElementById("dayCalLabel").textContent = fmtDayLabel(key);
      const blocks = getDaySchedule();
      const totalMin = blocks.reduce((s, b) => s + (b.durationMin || 0), 0);
      document.getElementById("dayCalTotal").textContent = totalMin > 0 ? `${fmtDur(totalMin)} planned` : "";

      timeGrid.innerHTML = "";
      const totalH = (DAY_CAL_END_MIN - DAY_CAL_START_MIN) * PX_PER_MIN;
      timeGrid.style.height = totalH + "px";

      // Time lines + labels
      for (let min = DAY_CAL_START_MIN; min <= DAY_CAL_END_MIN; min += 15) {
        const isHour = min % 60 === 0, isHalf = !isHour && min % 30 === 0;
        const line = document.createElement("div");
        line.className = `time-line ${isHour ? "hour-line" : isHalf ? "half-line" : "quarter-line"}`;
        line.style.top = minToY(min) + "px";
        if (min % 30 === 0 && min < DAY_CAL_END_MIN) {
          const lbl = document.createElement("span");
          lbl.className = "time-label";
          lbl.textContent = fmtMin(min);
          line.appendChild(lbl);
        }
        timeGrid.appendChild(line);
      }

      // Current time
      if (key === getTodayKey()) {
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        if (nowMin >= DAY_CAL_START_MIN && nowMin < DAY_CAL_END_MIN) {
          const nowEl = document.createElement("div");
          nowEl.className = "time-now-line";
          nowEl.style.top = minToY(nowMin) + "px";
          timeGrid.appendChild(nowEl);
        }
      }

      // Drop zone
      const dropZone = document.createElement("div");
      dropZone.className = "time-drop-zone";
      setupDragCreate(dropZone, timeGrid);
      timeGrid.appendChild(dropZone);

      // Manual blocks
      blocks.forEach((block, idx) => {
        if (!block || block.startMin == null) return;
        timeGrid.appendChild(createCalBlock(block, idx, timeGrid));
      });

      // Outlook events (read-only, behind manual blocks)
      outlookEvents.forEach((ev) => {
        const startMin = graphDtToMin(ev.start);
        const endMin   = graphDtToMin(ev.end);
        if (startMin == null || endMin == null) return;
        const clampStart = Math.max(startMin, DAY_CAL_START_MIN);
        const clampEnd   = Math.min(endMin,   DAY_CAL_END_MIN);
        if (clampEnd <= clampStart) return;
        const dur = clampEnd - clampStart;
        const oEl = document.createElement("div");
        oEl.className = "cal-block cal-block-outlook";
        oEl.style.top    = minToY(clampStart) + "px";
        oEl.style.height = Math.max(16, dur * PX_PER_MIN) + "px";
        oEl.innerHTML = `<div class="cal-block-title">${escapeHtml(ev.subject || "Busy")}</div>${dur > 30 ? `<div class="cal-block-meta">${fmtMin(clampStart)} – ${fmtMin(clampEnd)}</div>` : ""}`;
        timeGrid.appendChild(oEl);
      });
    }

    function createCalBlock(block, idx, timeGrid) {
      const el = document.createElement("div");
      const color = BLOCK_COLORS.includes(block.color) ? block.color : DEFAULT_BLOCK_COLOR;
      el.className = `cal-block cal-block-${color}`;
      const top = minToY(block.startMin);
      const blockH = Math.max(16, (block.durationMin || 30) * PX_PER_MIN);
      el.style.top = top + "px";
      el.style.height = blockH + "px";
      const endMin = block.startMin + (block.durationMin || 30);
      const synced = !!block.outlookEventId;
      el.innerHTML = `<div class="cal-block-title" style="padding-right:${getGraphAccount() ? "20px" : "0"}">${escapeHtml(block.title || "Untitled")}</div>${blockH > 32 ? `<div class="cal-block-meta">${fmtMin(block.startMin)} – ${fmtMin(endMin)} · ${fmtDur(block.durationMin || 30)}</div>` : ""}<div class="cal-block-resize"></div>`;
      if (getGraphAccount()) {
        const pushBtn = document.createElement("button");
        pushBtn.type = "button";
        pushBtn.className = "cal-push-btn" + (synced ? " synced" : "");
        pushBtn.title = synced ? "Update in Outlook" : "Save to Outlook";
        pushBtn.textContent = synced ? "✓" : "☁";
        pushBtn.addEventListener("click", (e) => { e.stopPropagation(); pushBlockToOutlook(idx); });
        el.appendChild(pushBtn);
      }
      const resizeHandle = el.querySelector(".cal-block-resize");

      // Drag to move (or click to edit)
      el.addEventListener("mousedown", (e) => {
        if (e.target === resizeHandle) return;
        e.stopPropagation(); e.preventDefault();
        let dragMoved = false, ghost = null, newStartMin = block.startMin;
        const gridRect = timeGrid.getBoundingClientRect();
        const clickY = e.clientY - gridRect.top;
        const clickOffset = clickY - top;
        const onMove = (ev) => {
          const curY = ev.clientY - gridRect.top;
          if (!dragMoved && Math.abs(curY - clickY) < 6) return;
          dragMoved = true;
          el.classList.add("is-dragging");
          if (!ghost) {
            ghost = document.createElement("div");
            ghost.className = "cal-ghost";
            ghost.style.height = blockH + "px";
            const lbl = document.createElement("span"); lbl.className = "cal-ghost-label";
            ghost.appendChild(lbl);
            timeGrid.appendChild(ghost);
          }
          const maxTop = (DAY_CAL_END_MIN - DAY_CAL_START_MIN - (block.durationMin || 30)) * PX_PER_MIN;
          const newTop = Math.max(0, Math.min(maxTop, curY - clickOffset));
          newStartMin = yToSnappedMin(newTop);
          ghost.style.top = minToY(newStartMin) + "px";
          ghost.querySelector(".cal-ghost-label").textContent = `${fmtMin(newStartMin)} · ${fmtDur(block.durationMin || 30)}`;
        };
        const onUp = () => {
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          el.classList.remove("is-dragging");
          if (ghost) { ghost.remove(); ghost = null; }
          if (!dragMoved) { openBlockEditor(idx); }
          else { block.startMin = newStartMin; persist(); renderDailyCalendar(); }
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      // Resize
      resizeHandle.addEventListener("mousedown", (e) => {
        e.stopPropagation(); e.preventDefault();
        const startY = e.clientY, startDur = block.durationMin || 30;
        let newDur = startDur;
        const onMove = (ev) => {
          const dy = ev.clientY - startY;
          newDur = Math.max(SNAP_MIN, Math.min(DAY_CAL_END_MIN - block.startMin,
            Math.round((startDur + dy / PX_PER_MIN) / SNAP_MIN) * SNAP_MIN));
          el.style.height = Math.max(16, newDur * PX_PER_MIN) + "px";
          const metaEl = el.querySelector(".cal-block-meta");
          if (metaEl) metaEl.textContent = `${fmtMin(block.startMin)} – ${fmtMin(block.startMin + newDur)} · ${fmtDur(newDur)}`;
        };
        const onUp = () => {
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          block.durationMin = newDur; persist(); renderDailyCalendar();
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      return el;
    }

    function setupDragCreate(dropZone, timeGrid) {
      dropZone.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        e.preventDefault();
        const gridRect = timeGrid.getBoundingClientRect();
        const startY = e.clientY - gridRect.top;
        const startMin = yToSnappedMin(startY);
        let endMin = startMin + SNAP_MIN;
        const ghost = document.createElement("div");
        ghost.className = "cal-ghost";
        ghost.style.top = minToY(startMin) + "px";
        ghost.style.height = SNAP_MIN * PX_PER_MIN + "px";
        const lbl = document.createElement("span"); lbl.className = "cal-ghost-label";
        lbl.textContent = `${fmtMin(startMin)} · ${fmtDur(SNAP_MIN)}`;
        ghost.appendChild(lbl);
        timeGrid.appendChild(ghost);
        const onMove = (ev) => {
          const curY = ev.clientY - gridRect.top;
          endMin = yToSnappedMin(curY);
          const dur = Math.max(SNAP_MIN, endMin - startMin);
          ghost.style.height = dur * PX_PER_MIN + "px";
          lbl.textContent = `${fmtMin(startMin)} · ${fmtDur(dur)}`;
        };
        const onUp = () => {
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          ghost.remove();
          const dur = Math.max(SNAP_MIN, endMin - startMin);
          const blocks = getDaySchedule();
          blocks.push({ id: makeId("block"), title: "", startMin, durationMin: dur, color: DEFAULT_BLOCK_COLOR, note: "" });
          persist(); renderDailyCalendar();
          openBlockEditor(blocks.length - 1);
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
    }

    /* ────────── Block editor ────────── */
    function openBlockEditor(idx) {
      selectedBlockIdx = idx;
      const block = getDaySchedule()[idx];
      if (!block) return;
      document.getElementById("blockTitle").value = block.title || "";
      const h = Math.floor(block.startMin / 60), m = block.startMin % 60;
      document.getElementById("blockStart").value = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      const durOpts = [15,30,45,60,90,120,180,240];
      const closest = durOpts.reduce((p,c) => Math.abs(c-(block.durationMin||60)) < Math.abs(p-(block.durationMin||60)) ? c : p);
      document.getElementById("blockDuration").value = String(closest);
      document.getElementById("blockNote").value = block.note || "";
      document.querySelectorAll(".color-chip").forEach(c => c.classList.toggle("active", c.dataset.color === (block.color || DEFAULT_BLOCK_COLOR)));
      const blockModal = document.getElementById("blockModal");
      blockModal.classList.add("open");
      blockModal.setAttribute("aria-hidden","false");
      setTimeout(() => document.getElementById("blockTitle").focus(), 0);
    }

    function closeBlockEditor() {
      const bm = document.getElementById("blockModal");
      bm.classList.remove("open");
      bm.setAttribute("aria-hidden","true");
    }

    function saveBlock() {
      const blocks = getDaySchedule();
      if (selectedBlockIdx == null || !blocks[selectedBlockIdx]) return;
      const block = blocks[selectedBlockIdx];
      block.title = document.getElementById("blockTitle").value.trim();
      const sv = document.getElementById("blockStart").value;
      if (sv) {
        const [bh, bm] = sv.split(":").map(Number);
        const ns = bh * 60 + bm;
        if (ns >= DAY_CAL_START_MIN && ns < DAY_CAL_END_MIN) block.startMin = ns;
      }
      const nd = parseInt(document.getElementById("blockDuration").value, 10);
      if (nd >= 15) block.durationMin = nd;
      block.note = document.getElementById("blockNote").value.trim();
      persist();
      renderDailyCalendar();
    }

    function renderStats() {
      return;
    }

    function deletePost(day, postIndex) {
      const posts = dayPosts(day);
      posts.splice(postIndex, 1);
      if (state.selectedDay === day && state.selectedPostIndex >= posts.length) {
        state.selectedPostIndex = Math.max(posts.length - 1, 0);
      }
      persist();
      render();
    }

    function duplicatePost(day, postIndex) {
      const posts = dayPosts(day);
      const source = posts[postIndex];
      if (!source) return;
      const clone = JSON.parse(JSON.stringify(source));
      posts.splice(postIndex + 1, 0, clone);
      setSavedLabel("Saving...");
      persist();
      render();
    }

    function movePost(fromDay, fromIndex, toDay) {
      if (!DAYS.includes(fromDay) || !DAYS.includes(toDay)) return;
      const sourcePosts = dayPosts(fromDay);
      const [post] = sourcePosts.splice(fromIndex, 1);
      if (!post) return;
      dayPosts(toDay).push(post);
      if (state.selectedDay === fromDay && state.selectedPostIndex === fromIndex) {
        state.selectedDay = toDay;
        state.selectedPostIndex = dayPosts(toDay).length - 1;
      }
      persist();
      render();
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      const { datesByDay, activeWeekday } = weekContext();
      const statusFilter = state.filters.status;
      const platformFilter = state.filters.platform;
      calendarPlatformFilter.value = platformFilter;
      calendarStatusFilter.value = statusFilter;
      DAYS.forEach((day) => {
        const dayCard = document.createElement("article");
        const dayDate = datesByDay[day];
        const dayDateLabel = dayDate ? dayDate.toLocaleDateString(undefined, { month: "short", day: "numeric" }) : "";
        const todayLabel = day === activeWeekday ? ' aria-current="date"' : "";
        dayCard.className = "day" + (day === state.selectedDay ? " active" : "") + (day === activeWeekday ? " today" : "");
        dayCard.innerHTML = `<div class="day-head"><span class="day-name"${todayLabel}>${day}${day === activeWeekday ? '<span class="day-today-badge">Today</span>' : ''}</span><span class="day-date">${dayDateLabel}</span></div>`;

        dayCard.addEventListener("dragover", (event) => {
          event.preventDefault();
          dayCard.classList.add("drag-over");
        });
        dayCard.addEventListener("dragleave", () => dayCard.classList.remove("drag-over"));
        dayCard.addEventListener("drop", (event) => {
          event.preventDefault();
          dayCard.classList.remove("drag-over");
          if (dragState.fromDay == null || dragState.fromIndex == null) return;
          movePost(dragState.fromDay, dragState.fromIndex, day);
          dragState.fromDay = null;
          dragState.fromIndex = null;
        });

        const postsContainer = document.createElement("div");
        postsContainer.className = "day-posts";

        dayPosts(day).forEach((post, index) => {
          if (!post || !String(post.postTitle || "").trim()) return;
          const platforms = Array.isArray(post.platforms) ? post.platforms.map((item) => String(item).toLowerCase()) : [String(post.platform || "").toLowerCase()].filter(Boolean);
          const normalizedStatus = String(post.status || "planned").toLowerCase().trim();
          if (statusFilter !== "all" && normalizedStatus !== statusFilter) return;
          if (platformFilter !== "all" && !platforms.includes(platformFilter)) return;

          const wrap = document.createElement("div");
          wrap.className = "post-tile-wrap";

          const tile = document.createElement("button");
          tile.type = "button";
          tile.draggable = true;
          tile.className = `post-tile ${platformClass(post.platforms || post.platform)} ${statusClass(post.status)}`.trim();
          const statusLabel = String(post.status || "planned").trim() || "planned";
          const typeTag = String(post.postType || "").trim();
          const typeTagMarkup = typeTag ? `<span class="post-type-tag ${postTypeClass(typeTag)}">${escapeHtml(typeTag)}</span>` : "";
          const platformMarkup = platformIcons(post.platforms || post.platform);
          const objectiveMarkup = post.objective ? `<span class="post-goal">${escapeHtml(post.objective)}</span>` : "";
          const kpiMarkup = post.kpiTarget ? `<span class="post-goal">KPI: ${escapeHtml(post.kpiTarget)}</span>` : "";
          tile.innerHTML = `<span class="post-tile-top"><span class="post-title">${escapeHtml(post.postTitle)}</span><span class="platform-icons">${platformMarkup || '<span>Set platform</span>'}</span></span><span class="post-badges">${typeTagMarkup}<span class="post-status">${escapeHtml(statusLabel)}</span></span><span class="post-meta"><span>${escapeHtml(post.time || "Set time")}</span><span class="post-goals">${objectiveMarkup}${kpiMarkup}</span></span>`;
          tile.addEventListener("click", () => openEditor(day, index));
          tile.addEventListener("dragstart", () => {
            dragState.fromDay = day;
            dragState.fromIndex = index;
          });
          tile.addEventListener("dragend", () => {
            dragState.fromDay = null;
            dragState.fromIndex = null;
            document.querySelectorAll(".day.drag-over").forEach((card) => card.classList.remove("drag-over"));
          });

          const actions = document.createElement("div");
          actions.className = "post-actions";

          const duplicateButton = document.createElement("button");
          duplicateButton.type = "button";
          duplicateButton.className = "post-action";
          duplicateButton.setAttribute("aria-label", `Duplicate post ${index + 1} on ${day}`);
          duplicateButton.textContent = "⧉";
          duplicateButton.addEventListener("click", (event) => {
            event.stopPropagation();
            duplicatePost(day, index);
          });

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "post-action post-delete";
          deleteButton.setAttribute("aria-label", `Delete post ${index + 1} on ${day}`);
          deleteButton.textContent = "🗑";
          deleteButton.addEventListener("click", (event) => {
            event.stopPropagation();
            deletePost(day, index);
          });

          actions.appendChild(duplicateButton);
          actions.appendChild(deleteButton);
          wrap.appendChild(tile);
          wrap.appendChild(actions);
          postsContainer.appendChild(wrap);
        });

        if (!postsContainer.hasChildNodes()) {
          const allPosts = dayPosts(day).filter(p => p && String(p.postTitle || "").trim());
          const emptyEl = document.createElement("div");
          emptyEl.className = "day-empty";
          emptyEl.textContent = allPosts.length > 0 ? "No posts match the current filter" : "No posts scheduled";
          postsContainer.appendChild(emptyEl);
        }

        dayCard.appendChild(postsContainer);

        calendar.appendChild(dayCard);
      });
    }

    function escapeHtml(text) {
      return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function syncPriorityVisibility() {
      const [p1, p2, p3] = state.data[state.brand].priorities.map((item) => String(item || "").trim());
      const showSecond = Boolean(p1 || p2 || p3);
      const showThird = Boolean(p2 || p3);
      priorityItem2.classList.toggle("hidden", !showSecond);
      priorityItem3.classList.toggle("hidden", !showThird);
    }

    function normalizeTodoPriority(priority) {
      const value = String(priority || "").toLowerCase().trim();
      return ["high", "medium", "low"].includes(value) ? value : "medium";
    }

    function normalizeRecurringFrequency(frequency) {
      const value = String(frequency || "").toLowerCase().trim();
      if (value === "biweekly") return "bi-weekly";
      return ["daily", "weekly", "bi-weekly", "monthly"].includes(value) ? value : "weekly";
    }

    function normalizeRecurringPeriod(period) {
      const value = String(period || "").toLowerCase().trim();
      return ["anytime", "morning", "afternoon", "evening"].includes(value) ? value : "anytime";
    }

    function normalizeRecurringStatus(status) {
      const value = String(status || "").toLowerCase().trim();
      return ["in progress", "done", "on hold"].includes(value) ? value : "in progress";
    }

    function renderTodos() {
      const todos = state.data[state.brand].todos || [];
      const priorityRank = { high: 0, medium: 1, low: 2 };
      const sorted = todos.map((todo, index) => ({ ...todo, originalIndex: index }))
        .sort((a, b) => {
          const priorityDiff = priorityRank[normalizeTodoPriority(a.priority)] - priorityRank[normalizeTodoPriority(b.priority)];
          if (priorityDiff !== 0) return priorityDiff;
          if (a.done !== b.done) return a.done ? 1 : -1;
          return a.originalIndex - b.originalIndex;
        });
      todoList.innerHTML = "";
      sorted.forEach((todo, visualIndex) => {
        const index = todo.originalIndex;
        const row = document.createElement("div");
        row.setAttribute("role", "button");
        row.setAttribute("tabindex", "0");
        row.className = "todo-item" + (todo.done ? " done" : "");
        row.innerHTML = `<input type="checkbox" data-todo-check="${index}" ${todo.done ? "checked" : ""} /><span class="todo-name">${escapeHtml(todo.text || `Task ${visualIndex + 1}`)}</span><span class="todo-priority-badge" data-priority="${normalizeTodoPriority(todo.priority)}">${escapeHtml(normalizeTodoPriority(todo.priority))}</span><button type="button" class="todo-delete" data-todo-delete="${index}" aria-label="Delete task ${visualIndex + 1}"><svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false"><path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 6h2v8h-2V9Zm4 0h2v8h-2V9ZM8 9h2v8H8V9Zm-1 12h10a2 2 0 0 0 2-2V7H5v12a2 2 0 0 0 2 2Z" fill="currentColor"/></svg></button>`;
        row.addEventListener("click", (event) => {
          if (event.target.closest("[data-todo-check]") || event.target.closest("[data-todo-delete]")) return;
          openTodoEditor(index);
        });
        row.addEventListener("keydown", (event) => {
          if (!["Enter", " "].includes(event.key)) return;
          event.preventDefault();
          openTodoEditor(index);
        });
        todoList.appendChild(row);
      });
      if (!todoList.hasChildNodes()) {
        const empty = document.createElement("div");
        empty.className = "todo-empty";
        empty.textContent = "No tasks yet";
        todoList.appendChild(empty);
      }
    }

    function currentTodoTask() {
      const todos = state.data[state.brand].todos || [];
      if (state.selectedTodoIndex == null || !todos[state.selectedTodoIndex]) return null;
      return todos[state.selectedTodoIndex];
    }

    function openTodoEditor(index) {
      restoreFocusTo = document.activeElement;
      state.selectedTodoIndex = index;
      todoModal.classList.add("open");
      todoModal.setAttribute("aria-hidden", "false");
      renderTodoDetails();
      setTimeout(() => fields.todoName.focus(), 0);
    }

    function closeTodoEditor() {
      todoModal.classList.remove("open");
      todoModal.setAttribute("aria-hidden", "true");
      if (restoreFocusTo && typeof restoreFocusTo.focus === "function") restoreFocusTo.focus();
    }

    function renderTodoDetails() {
      const todo = currentTodoTask();
      if (!todo) return;
      fields.todoName.value = todo.text || "";
      fields.todoPriority.value = normalizeTodoPriority(todo.priority);
      const projects = projectList();
      const options = ['<option value="">No project</option>']
        .concat(projects.map((project) => `<option value="${escapeHtml(project.id)}">${escapeHtml(project.name || "Untitled project")}</option>`));
      fields.todoProject.innerHTML = options.join("");
      fields.todoProject.value = String(todo.projectId || "");
      document.getElementById("todoEditorTitle").textContent = `To do details • ${todo.text || `Task ${state.selectedTodoIndex + 1}`}`;
    }

    function recurringTaskList() {
      const recurringTasks = state.data[state.brand].recurringTasks;
      return Array.isArray(recurringTasks) ? recurringTasks : [];
    }

    function closeRecurringEditor() { /* no-op: recurring editor is now inline */ }

    function renderRecurringTasks() {
      const tasks = recurringTaskList();
      recurringList.innerHTML = "";
      const FREQ_CYCLE = ["daily", "weekly", "bi-weekly", "monthly"];

      if (tasks.length === 0) {
        const empty = document.createElement("div");
        empty.className = "recurring-empty";
        empty.textContent = "No recurring tasks — click + to add one";
        recurringList.appendChild(empty);
        return;
      }

      tasks.forEach((task, index) => {
        if (!task) return;
        const row = document.createElement("div");
        row.className = "recurring-row" + (task.done ? " done" : "");

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.className = "recurring-check";
        cb.checked = !!task.done;
        cb.setAttribute("aria-label", "Mark complete for this period");
        cb.addEventListener("change", () => {
          task.done = cb.checked;
          row.classList.toggle("done", task.done);
          persist();
        });

        const nameEl = document.createElement("span");
        nameEl.className = "recurring-name-edit";
        nameEl.contentEditable = "plaintext-only";
        nameEl.textContent = task.text || "";
        nameEl.dataset.placeholder = "Task name";
        nameEl.setAttribute("role", "textbox");
        nameEl.setAttribute("aria-label", "Task name");
        nameEl.addEventListener("blur", () => { task.text = nameEl.textContent.trim(); persist(); });
        nameEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); nameEl.blur(); }
          if (e.key === "Escape") { nameEl.textContent = task.text || ""; nameEl.blur(); }
        });

        const freqBtn = document.createElement("button");
        freqBtn.type = "button";
        freqBtn.className = "recurring-freq-badge";
        freqBtn.textContent = titleCase(normalizeRecurringFrequency(task.frequency));
        freqBtn.title = "Click to change frequency";
        freqBtn.addEventListener("click", () => {
          const current = normalizeRecurringFrequency(task.frequency);
          task.frequency = FREQ_CYCLE[(FREQ_CYCLE.indexOf(current) + 1) % FREQ_CYCLE.length];
          freqBtn.textContent = titleCase(task.frequency);
          persist();
        });

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "recurring-del-btn";
        delBtn.setAttribute("aria-label", "Delete task");
        delBtn.innerHTML = `<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
        delBtn.addEventListener("click", () => {
          tasks.splice(index, 1);
          persist();
          renderRecurringTasks();
        });

        row.appendChild(cb);
        row.appendChild(nameEl);
        row.appendChild(freqBtn);
        row.appendChild(delBtn);
        recurringList.appendChild(row);
      });
    }

    function hasPriorityContent() {
      return (state.data[state.brand].priorities || []).some((item) => String(item || "").trim());
    }

    function hasTodoContent() {
      return (state.data[state.brand].todos || []).some((todo) => String((todo && todo.text) || "").trim() || Boolean(todo && todo.done));
    }

    function projectList() {
      const projects = state.data[state.brand].projects;
      return Array.isArray(projects) ? projects : [];
    }

    function currentProject() {
      const projects = projectList();
      if (state.selectedProjectIndex == null || !projects[state.selectedProjectIndex]) return null;
      return projects[state.selectedProjectIndex];
    }

    function hasProjectsContent() {
      return projectList().length > 0;
    }


    function normalizeProjectStatus(status) {
      const normalized = String(status || "").toLowerCase().trim();
      const allowed = ["not started", "in progress", "strategizing", "completed", "on hold"];
      return allowed.includes(normalized) ? normalized : "in progress";
    }

    function titleCase(text) {
      return String(text || "").replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function openProjectEditor(index) {
      restoreFocusTo = document.activeElement;
      state.selectedProjectIndex = index;
      projectModal.classList.add("open");
      projectModal.setAttribute("aria-hidden", "false");
      renderProjectDetails();
      renderProjects();
      setTimeout(() => fields.projectName.focus(), 0);
    }

    function closeProjectEditor() {
      projectModal.classList.remove("open");
      projectModal.setAttribute("aria-hidden", "true");
      if (restoreFocusTo && typeof restoreFocusTo.focus === "function") restoreFocusTo.focus();
    }

    function projectTodoEntries(projectId) {
      return (state.data[state.brand].todos || []).map((todo, index) => ({ todo, index }))
        .filter(({ todo }) => todo && todo.projectId === projectId);
    }

    function renderProjectTodos() {
      const project = currentProject();
      projectTodoList.innerHTML = "";
      if (!project) return;
      const linkedTodos = projectTodoEntries(project.id);
      linkedTodos.forEach(({ todo, index }, rowIndex) => {
        const row = document.createElement("div");
        row.className = "project-todo-item" + (todo.done ? " done" : "");
        row.innerHTML = `<input type="checkbox" data-project-todo-check="${index}" ${todo.done ? "checked" : ""} /><input type="text" data-project-todo-text="${index}" placeholder="Task ${rowIndex + 1}" value="${escapeHtml(todo.text || "")}" /><button type="button" class="todo-delete" data-project-todo-delete="${index}" aria-label="Delete project task ${rowIndex + 1}"><svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false"><path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 6h2v8h-2V9Zm4 0h2v8h-2V9ZM8 9h2v8H8V9Zm-1 12h10a2 2 0 0 0 2-2V7H5v12a2 2 0 0 0 2 2Z" fill="currentColor"/></svg></button>`;
        projectTodoList.appendChild(row);
      });
    }

    function renderProjects() {
      const projects = projectList();
      projectGrid.innerHTML = "";
      projects.forEach((project, index) => {
        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "project-tile" + (index === state.selectedProjectIndex && projectModal.classList.contains("open") ? " active" : "");
        const status = normalizeProjectStatus(project.status);
        const linkedTodos = (state.data[state.brand].todos || []).filter((todo) => todo && todo.projectId === project.id && String(todo.text || "").trim());
        const doneCount = linkedTodos.filter(t => t.done).length;
        const totalTasks = linkedTodos.length;
        const progressPct = totalTasks > 0 ? Math.round((doneCount / totalTasks) * 100) : null;
        const progressMarkup = progressPct !== null ? `<div class="project-progress-wrap"><div class="project-progress-fill" style="width:${progressPct}%"></div></div><div class="project-progress-label">${doneCount} / ${totalTasks} tasks done</div>` : "";
        const linkedMarkup = linkedTodos.length ? `<div class="linked-task-list">${linkedTodos.map((todo) => `<div class="linked-task"><span>${escapeHtml(todo.text)}</span><span>${escapeHtml(titleCase(normalizeTodoPriority(todo.priority)))}</span></div>`).join("")}</div>` : "";
        const dueState = withinCurrentWeek(project.deadline);
        const dueMarkup = dueState === "overdue"
          ? '<span class="due-badge">Overdue</span>'
          : dueState === "week"
            ? '<span class="due-badge week">Due this week</span>'
            : "";
        const deadlineText = project.deadline ? new Date(`${project.deadline}T00:00:00`).toLocaleDateString(undefined, { month: "short", day: "numeric" }) : "No date";
        tile.innerHTML = `<span class="project-head"><span class="project-name">${escapeHtml(project.name || `Project ${index + 1}`)}</span><span class="project-deadline">${escapeHtml(deadlineText)}</span></span><span class="project-status" data-state="${escapeHtml(status)}">${escapeHtml(titleCase(status))}</span>${dueMarkup}${progressMarkup}${linkedMarkup}`;
        tile.addEventListener("click", () => {
          openProjectEditor(index);
        });
        projectGrid.appendChild(tile);
      });

      const add = document.createElement("button");
      add.type = "button";
      add.className = "project-add";
      add.textContent = "+ New project";
      add.addEventListener("click", () => {
        setSavedLabel("Saving...");
        projects.push({ id: makeId("project"), name: "", status: "not started", deadline: "" });
        state.panelOpen[state.brand].projects = true;
        persist();
        renderSectionToggles();
        openProjectEditor(projects.length - 1);
      });
      projectGrid.appendChild(add);
    }

    function renderProjectDetails() {
      const project = currentProject();
      if (!project) return;
      const status = normalizeProjectStatus(project.status);
      fields.projectName.value = project.name || "";
      fields.projectDeadline.value = project.deadline || "";
      projectStatusOptions.querySelectorAll(".project-status-option").forEach((option) => {
        option.classList.toggle("active", option.dataset.status === status);
      });
      document.getElementById("projectEditorTitle").textContent = `Project details • ${project.name || `Project ${state.selectedProjectIndex + 1}`}`;
      renderProjectTodos();
    }

    function updatePanelSection(contentEl, buttonEl, isOpen) {
      contentEl.classList.toggle("collapsed", !isOpen);
      buttonEl.innerHTML = '<svg class="panel-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>';
      buttonEl.classList.toggle("panel-open", isOpen);
      buttonEl.setAttribute("aria-expanded", isOpen ? "true" : "false");
    }

    function renderSectionToggles() {
      const panelState = state.panelOpen[state.brand];
      const prioritiesOpen = panelState.priorities == null ? hasPriorityContent() : panelState.priorities;
      const todosOpen = panelState.todos == null ? hasTodoContent() : panelState.todos;
      const projectsOpen = panelState.projects == null ? hasProjectsContent() : panelState.projects;
      const recurringOpen = panelState.recurring == null ? true : panelState.recurring;

      updatePanelSection(prioritiesContent, prioritiesToggle, prioritiesOpen);
      updatePanelSection(todosContent, todosToggle, todosOpen);
      updatePanelSection(projectsContent, projectsToggle, projectsOpen);
      updatePanelSection(recurringContent, recurringToggle, recurringOpen);
    }

    function render() {
      const brandConfig = {
        is: { primary: "#00549A", accent: "#0070CA", subtitle: "Integrated Staffing", mark: "IS" },
        as: { primary: "#C77800", accent: "#F0A31A", subtitle: "Accountant Staffing", mark: "AS" },
        ad: { primary: "#21356e", accent: "#4f6db6", subtitle: "Administrative Staffing", mark: "AD" }
      };
      const currentBrand = brandConfig[state.brand] || brandConfig.is;
      document.documentElement.style.setProperty("--primary", currentBrand.primary);
      document.documentElement.style.setProperty("--accent", currentBrand.accent);
      brandSubtitle.textContent = currentBrand.subtitle;
      brandMark.textContent = currentBrand.mark;
      buttons.forEach((btn) => {
        const isActive = btn.dataset.brand === state.calBrand;
        btn.classList.toggle("active", isActive);
        btn.setAttribute("aria-selected", isActive ? "true" : "false");
        btn.setAttribute("tabindex", isActive ? "0" : "-1");
      });
      const priorities = state.data[state.brand].priorities || ["", "", ""];
      fields.priority1.value = priorities[0] || "";
      fields.priority2.value = priorities[1] || "";
      fields.priority3.value = priorities[2] || "";
      syncPriorityVisibility();
      renderSectionToggles();

      renderRecurringTasks();
      renderTodos();
      renderProjects();
      if (projectModal.classList.contains("open")) renderProjectDetails();
      if (todoModal.classList.contains("open")) renderTodoDetails();

      const post = editorModal.classList.contains("open") ? currentPost(false) : {};
      document.getElementById("editorTitle").textContent = `Post Details • ${state.selectedDay}`;
      fields.postDay.value = state.selectedDay;
      ["postTitle","time","status","caption","postType","objective","kpiTarget"].forEach((key) => { fields[key].value = post[key] || ""; });
      fields.postLink.value = post.postLink || post.asset || "";
      const selectedPlatforms = Array.isArray(post.platforms) ? post.platforms : (post.platform ? [post.platform] : []);
      platformPicker.querySelectorAll(".tag-chip").forEach((chip) => {
        chip.classList.toggle("active", selectedPlatforms.includes(chip.dataset.platform));
      });
      statusPicker.querySelectorAll(".status-tag").forEach((tag) => {
        tag.classList.toggle("active", tag.dataset.status === (post.status || "").toLowerCase());
      });

      weekBadge.textContent = `Week of ${formatWeekOf()}`;
      renderStats();
      renderCalendar();
      renderDailyCalendar();
    }

    function bindPostInput(input, key) {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        currentPost()[key] = input.value;
        persist();
        renderCalendar();
        renderStats();
      });
    }

    buttons.forEach((btn) => btn.addEventListener("click", () => {
      state.calBrand = btn.dataset.brand;
      state.selectedDay = "Monday"; state.selectedPostIndex = 0;
      buttons.forEach((b) => {
        const active = b.dataset.brand === state.calBrand;
        b.classList.toggle("active", active);
        b.setAttribute("aria-selected", active ? "true" : "false");
        b.setAttribute("tabindex", active ? "0" : "-1");
      });
      renderCalendar();
    }));
    document.querySelector(".toggle").addEventListener("keydown", (event) => {
      const index = Array.from(buttons).findIndex((button) => button.dataset.brand === state.calBrand);
      if (!["ArrowRight", "ArrowLeft", "Home", "End"].includes(event.key)) return;
      event.preventDefault();
      let nextIndex = index;
      if (event.key === "ArrowRight") nextIndex = (index + 1) % buttons.length;
      if (event.key === "ArrowLeft") nextIndex = (index - 1 + buttons.length) % buttons.length;
      if (event.key === "Home") nextIndex = 0;
      if (event.key === "End") nextIndex = buttons.length - 1;
      buttons[nextIndex].focus();
      buttons[nextIndex].click();
    });

    [fields.priority1, fields.priority2, fields.priority3].forEach((input, index) => {
      input.addEventListener("input", () => {
        setSavedLabel("Saving...");
        state.data[state.brand].priorities[index] = input.value;
        persist();
        syncPriorityVisibility();
        state.panelOpen[state.brand].priorities = hasPriorityContent();
        renderSectionToggles();
      });
    });

    platformPicker.querySelectorAll(".tag-chip").forEach((chip) => chip.addEventListener("click", () => {
      setSavedLabel("Saving...");
      const post = currentPost();
      const selectedPlatforms = Array.isArray(post.platforms) ? [...post.platforms] : (post.platform ? [post.platform] : []);
      const index = selectedPlatforms.indexOf(chip.dataset.platform);
      if (index >= 0) selectedPlatforms.splice(index, 1);
      else selectedPlatforms.push(chip.dataset.platform);
      post.platforms = selectedPlatforms;
      post.platform = selectedPlatforms.join(", ");
      persist();
      render();
    }));

    todoList.addEventListener("change", (event) => {
      const check = event.target.closest("[data-todo-check]");
      if (!check) return;
      const index = Number(check.dataset.todoCheck);
      if (Number.isNaN(index) || !state.data[state.brand].todos[index]) return;
      setSavedLabel("Saving...");
      state.data[state.brand].todos[index].done = check.checked;
      renderTodos();
      persist();
      renderProjects();
      state.panelOpen[state.brand].todos = hasTodoContent();
      renderSectionToggles();
    });

    todoList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-todo-delete]");
      if (!button) return;
      event.stopPropagation();
      const index = Number(button.dataset.todoDelete);
      if (Number.isNaN(index)) return;
      setSavedLabel("Saving...");
      state.data[state.brand].todos.splice(index, 1);
      if (state.data[state.brand].todos.length === 0) state.data[state.brand].todos.push({ text: "", done: false, priority: "medium", projectId: "" });
      renderTodos();
      persist();
      renderProjects();
      state.panelOpen[state.brand].todos = hasTodoContent();
      renderSectionToggles();
      if (todoModal.classList.contains("open")) closeTodoEditor();
    });

    newTaskBtn.addEventListener("click", () => {
      setSavedLabel("Saving...");
      state.data[state.brand].todos.push({ text: "", done: false, priority: "medium", projectId: "" });
      state.panelOpen[state.brand].todos = true;
      renderTodos();
      persist();
      renderProjects();
      renderSectionToggles();
      openTodoEditor(state.data[state.brand].todos.length - 1);
    });

    [fields.todoName, fields.todoPriority, fields.todoProject].forEach((input) => {
      input.addEventListener("input", () => {
        const todo = currentTodoTask();
        if (!todo) return;
        setSavedLabel("Saving...");
        todo.text = fields.todoName.value;
        todo.priority = normalizeTodoPriority(fields.todoPriority.value);
        todo.projectId = fields.todoProject.value || "";
        persist();
        renderTodos();
        renderProjects();
        renderTodoDetails();
      });
      input.addEventListener("change", () => input.dispatchEvent(new Event("input", { bubbles: true })));
    });

      if (todos.length === 0) todos.push({ text: "", done: false, priority: "medium", projectId: "" });
      persist();
      renderTodos();
      renderProjects();
      closeTodoEditor();
      state.panelOpen[state.brand].todos = hasTodoContent();
      renderSectionToggles();
    });

      panelState.priorities = !current;
      renderSectionToggles();

    todosToggle.addEventListener("click", () => {
      const panelState = state.panelOpen[state.brand];
      const current = panelState.todos == null ? hasTodoContent() : panelState.todos;
      panelState.todos = !current;
      renderSectionToggles();

    projectsToggle.addEventListener("click", () => {

      panelState.projects = !current;
      renderSectionToggles();

    [fields.projectName, fields.projectDeadline].forEach((input) => {
      input.addEventListener("input", () => {
        const project = currentProject();
        if (!project) return;
        setSavedLabel("Saving...");
        project.name = fields.projectName.value;
        project.deadline = fields.projectDeadline.value;
        persist();
        renderProjects();
      });

    projectStatusOptions.querySelectorAll(".project-status-option").forEach((option) => {
      option.addEventListener("click", () => {
        const project = currentProject();
        if (!project) return;
        setSavedLabel("Saving...");
        project.status = normalizeProjectStatus(option.dataset.status);
        persist();
        renderProjects();
        renderProjectDetails();
      });
    });

    projectTodoList.addEventListener("input", (event) => {
      const input = event.target.closest("[data-project-todo-text]");
      if (!input) return;

      renderTodos();
      renderProjects();

    projectTodoList.addEventListener("change", (event) => {

      if (!check) return;
      const index = Number(check.dataset.projectTodoCheck);
      const todos = state.data[state.brand].todos || [];
      if (Number.isNaN(index) || !todos[index]) return;
      setSavedLabel("Saving...");
      todos[index].done = check.checked;
      renderProjectTodos();
      persist();
      renderTodos();
      renderProjects();
    });

    projectTodoList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-project-todo-delete]");
      if (!button) return;
      const index = Number(button.dataset.projectTodoDelete);
      const todos = state.data[state.brand].todos || [];
      if (Number.isNaN(index) || !todos[index]) return;

      renderTodos();

      renderProjects();
    });

    statusPicker.querySelectorAll(".status-tag").forEach((tag) => tag.addEventListener("click", () => {
      setSavedLabel("Saving...");
      currentPost().status = tag.dataset.status;
      fields.status.value = tag.dataset.status;
      persist();
      render();
    }));


    calendarAddBtn.addEventListener("click", () => {
      openEditor(state.selectedDay);
    });

    fields.postDay.addEventListener("change", () => {
      const targetDay = fields.postDay.value;
      if (!DAYS.includes(targetDay) || targetDay === state.selectedDay) return;
      setSavedLabel("Saving...");
      const sourcePosts = dayPosts(state.selectedDay);
      const [post] = sourcePosts.splice(state.selectedPostIndex, 1);
      const destinationPosts = dayPosts(targetDay);
      if (post) {
        destinationPosts.push(post);
        state.selectedPostIndex = destinationPosts.length - 1;
      } else {
        state.selectedPostIndex = destinationPosts.length;
      }
      state.selectedDay = targetDay;
      persist();
      render();
    });


    closeModal.addEventListener("click", () => {
      editorModal.classList.remove("open");
      editorModal.setAttribute("aria-hidden", "true");
      if (restoreFocusTo && typeof restoreFocusTo.focus === "function") restoreFocusTo.focus();
    });
    editorModal.addEventListener("click", (event) => {
      if (event.target === editorModal) {
        editorModal.classList.remove("open");
        editorModal.setAttribute("aria-hidden", "true");
        }
    });



    deleteProjectBtn.addEventListener("click", () => {
      const project = currentProject();
      if (!project) return;
      const confirmed = window.confirm("Delete this project? Linked tasks will remain but be unassigned.");
      if (!confirmed) return;
      const projects = projectList();
      projects.splice(state.selectedProjectIndex, 1);
      (state.data[state.brand].todos || []).forEach((todo) => {
        if (todo && todo.projectId === project.id) todo.projectId = "";
      });
      state.selectedProjectIndex = null;
      setSavedLabel("Saving...");
      persist();
      closeProjectEditor();
      render();
    });
    closeProjectModal.addEventListener("click", () => {
      closeProjectEditor();
      renderProjects();
    });
    projectModal.addEventListener("click", (event) => {
      if (event.target === projectModal) {
        closeProjectEditor();
        renderProjects();
      }
    });


    closeTodoModal.addEventListener("click", () => {
      closeTodoEditor();
    });
    todoModal.addEventListener("click", (event) => {
      if (event.target === todoModal) {
        closeTodoEditor();
      }
    });


    function trapFocus(event, modalCard, onClose) {
      if (event.key === "Escape") {
        onClose();
        return;
      }
      if (event.key !== "Tab") return;
      const focusable = modalCard.querySelectorAll("button,[href],input,select,textarea,[tabindex]:not([tabindex='-1'])");
      if (!focusable.length) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    editorModal.addEventListener("keydown", (event) => {
      const card = editorModal.querySelector(".modal-card");
      trapFocus(event, card, () => {
        editorModal.classList.remove("open");
        editorModal.setAttribute("aria-hidden", "true");
          if (restoreFocusTo && typeof restoreFocusTo.focus === "function") restoreFocusTo.focus();
      });
    });

    projectModal.addEventListener("keydown", (event) => {
      const card = projectModal.querySelector(".modal-card");
      trapFocus(event, card, () => {
        closeProjectEditor();
        renderProjects();
      });
    });


    todoModal.addEventListener("keydown", (event) => {
      const card = todoModal.querySelector(".modal-card");
      trapFocus(event, card, () => {
        closeTodoEditor();
      });
    });

    bindPostInput(fields.postTitle, "postTitle");
    bindPostInput(fields.time, "time");
    bindPostInput(fields.status, "status");
    bindPostInput(fields.caption, "caption");
    bindPostInput(fields.postType, "postType");
    bindPostInput(fields.postLink, "postLink");
    bindPostInput(fields.objective, "objective");
    bindPostInput(fields.kpiTarget, "kpiTarget");

    calendarPlatformFilter.addEventListener("change", () => {
      state.filters.platform = calendarPlatformFilter.value;
      renderCalendar();
    });

    calendarStatusFilter.addEventListener("change", () => {
      state.filters.status = calendarStatusFilter.value;
      renderCalendar();
    });

    themeToggle.addEventListener("click", () => {
      const nextTheme = document.body.classList.contains("dark-mode") ? "light" : "dark";
      applyTheme(nextTheme);
      localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
    });

    /* ─────────── Microsoft Graph / Outlook ─────────── */
    const GRAPH_CLIENT_ID = "5308f317-6b10-4859-97fe-2a17898b255f";
    const GRAPH_SCOPES    = ["Calendars.ReadWrite", "User.Read"];

    async function initMsal() {
      if (typeof msal === "undefined") {
        console.warn("MSAL not loaded — Outlook sync unavailable");
        return;
      }
      try {
        msalApp = new msal.PublicClientApplication({
          auth: {
            clientId: GRAPH_CLIENT_ID,
            authority: "https://login.microsoftonline.com/common",
            redirectUri: window.location.href.split("?")[0].split("#")[0]
          },
          cache: { cacheLocation: "localStorage" },
          system: { allowNativeBroker: false }
        });
        // handleRedirectPromise processes the auth code when Microsoft
        // redirects back to this page after loginRedirect()
        const result = await msalApp.handleRedirectPromise();
        if (result) console.log("MSAL redirect handled, account:", result.account?.username);
        updateOutlookAuthUI();
      } catch (err) {
        console.error("MSAL init failed:", err);
      }
    }

    function getGraphAccount() {
      if (!msalApp) return null;
      const accounts = msalApp.getAllAccounts();
      return accounts.length ? accounts[0] : null;
    }

    function updateOutlookAuthUI() {
      const signedIn = !!getGraphAccount();
      document.getElementById("msSignInBtn").style.display  = signedIn ? "none" : "";
      document.getElementById("msSyncBtn").style.display    = signedIn ? "" : "none";
      document.getElementById("msSignOutBtn").style.display = signedIn ? "" : "none";
      if (signedIn) fetchOutlookEventsForDay(state.dayCalDate || getTodayKey());
    }

    async function getGraphToken() {
      const account = getGraphAccount();
      if (!account) return null;
      try {
        const r = await msalApp.acquireTokenSilent({ scopes: GRAPH_SCOPES, account });
        return r.accessToken;
      } catch (silentErr) {
        try {
          await msalApp.acquireTokenRedirect({ scopes: GRAPH_SCOPES, account });
          return null; // page will redirect; caller won't get a token this time
        } catch (redirectErr) {
          console.error("Token acquisition failed:", redirectErr);
          return null;
        }
      }
    }

    async function outlookSignIn() {
      if (!msalApp) {
        alert("Outlook sync isn't available — the Microsoft sign-in library failed to load. Check the browser console for details.");
        return;
      }
      try {
        // Redirect flow: navigates away to Microsoft login, then back
        await msalApp.loginRedirect({ scopes: GRAPH_SCOPES });
      } catch (err) {
        console.error("Outlook sign-in failed:", err);
        alert(`Sign-in failed: ${err.message || err.errorCode || err}`);
      }
    }

    async function outlookSignOut() {
      if (!msalApp) return;
      const account = getGraphAccount();
      if (!account) return;
      try { await msalApp.logoutRedirect({ account }); } catch (err) {
        console.error("Sign-out failed:", err);
      }
      outlookEvents = [];
      updateOutlookAuthUI();
      renderDailyCalendar();
    }

    async function fetchOutlookEventsForDay(dateKey) {
      const token = await getGraphToken();
      if (!token || !dateKey) return;
      const [y, mo, d] = dateKey.split("-").map(Number);
      const start = new Date(y, mo - 1, d, 0, 0, 0).toISOString();
      const end   = new Date(y, mo - 1, d, 23, 59, 59).toISOString();
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      try {
        const resp = await fetch(
          `https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${encodeURIComponent(start)}&endDateTime=${encodeURIComponent(end)}&$select=subject,start,end,id&$top=50&$orderby=start/dateTime`,
          { headers: { "Authorization": `Bearer ${token}`, "Prefer": `outlook.timezone="${tz}"` } }
        );
        if (!resp.ok) return;
        const data = await resp.json();
        outlookEvents = data.value || [];
        renderDailyCalendar();
      } catch {}
    }

    function graphDtToMin(dtObj) {
      if (!dtObj || !dtObj.dateTime) return null;
      const m = dtObj.dateTime.match(/T(\d{2}):(\d{2})/);
      return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
    }

    async function pushBlockToOutlook(blockIdx) {
      const token = await getGraphToken();
      if (!token) return;
      const block = getDaySchedule()[blockIdx];
      if (!block) return;
      const dateKey = state.dayCalDate || getTodayKey();
      const [y, mo, d] = dateKey.split("-").map(Number);
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const toStr = (min) => {
        const h = Math.floor(min / 60), m = min % 60;
        return `${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}T${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:00`;
      };
      const payload = {
        subject: block.title || "Time block",
        body: { contentType: "text", content: block.note || "" },
        start: { dateTime: toStr(block.startMin), timeZone: tz },
        end:   { dateTime: toStr(block.startMin + (block.durationMin || 60)), timeZone: tz }
      };
      try {
        const isUpdate = !!block.outlookEventId;
        const url    = isUpdate ? `https://graph.microsoft.com/v1.0/me/events/${block.outlookEventId}` : "https://graph.microsoft.com/v1.0/me/events";
        const method = isUpdate ? "PATCH" : "POST";
        const resp = await fetch(url, {
          method,
          headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (resp.status === 404) { block.outlookEventId = null; return pushBlockToOutlook(blockIdx); }
        if (!resp.ok) return;
        const event = await resp.json();
        block.outlookEventId = event.id;
        persist();
        renderDailyCalendar();
        fetchOutlookEventsForDay(dateKey);
      } catch {}
    }
    /* ─────────────────────────────────────────────────── */

    // Day planner nav
    document.getElementById("dayCalPrev").addEventListener("click", () => shiftDayCalDate(-1));
    document.getElementById("dayCalNext").addEventListener("click", () => shiftDayCalDate(1));

    // Block modal
    const blockModal = document.getElementById("blockModal");
    document.getElementById("closeBlockModal").addEventListener("click", () => { saveBlock(); closeBlockEditor(); });
    blockModal.addEventListener("click", (e) => { if (e.target === blockModal) { saveBlock(); closeBlockEditor(); } });
    blockModal.addEventListener("keydown", (e) => {
      trapFocus(e, blockModal.querySelector(".modal-card"), () => { saveBlock(); closeBlockEditor(); });
    });
    document.getElementById("deleteBlockBtn").addEventListener("click", () => {
      const blocks = getDaySchedule();
      if (selectedBlockIdx != null && blocks[selectedBlockIdx]) {
        blocks.splice(selectedBlockIdx, 1);
        persist(); renderDailyCalendar();
      }
      closeBlockEditor();
    });
    document.getElementById("blockColorPicker").addEventListener("click", (e) => {
      const chip = e.target.closest(".color-chip");
      if (!chip || !chip.dataset.color) return;
      const blocks = getDaySchedule();
      const block = blocks[selectedBlockIdx];
      if (!block) return;
      block.color = chip.dataset.color;
      document.querySelectorAll(".color-chip").forEach(c => c.classList.toggle("active", c.dataset.color === block.color));
      persist(); renderDailyCalendar();
    });
    ["blockTitle","blockStart","blockDuration","blockNote"].forEach((id) => {
      const el = document.getElementById(id);
      el.addEventListener("input", saveBlock);
      el.addEventListener("change", saveBlock);
    });

    document.getElementById("msSignInBtn").addEventListener("click", outlookSignIn);
    document.getElementById("msSyncBtn").addEventListener("click", () => fetchOutlookEventsForDay(state.dayCalDate || getTodayKey()));
    document.getElementById("msSignOutBtn").addEventListener("click", outlookSignOut);

    state.dayCalDate = getTodayKey();
    loadThemePreference();
    load();
    render();
    initMsal();
    setInterval(() => {
      weekBadge.textContent = `Week of ${formatWeekOf()}`;
      renderCalendar();
    }, 60 * 60 * 1000);
  </script>
