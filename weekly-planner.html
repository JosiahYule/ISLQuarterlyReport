<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root{
      --green:#1a4a2e;
      --green-mid:#2d6e47;
      --green-light:#4a9e68;
      --green-pale:#d6ede0;
      --primary:#00549A;
      --accent:#0070CA;
      --cream:#f4f1ea;
      --white:#fffdf9;
      --ink:#1a1a18;
      --ink-mid:#3d3d38;
      --ink-muted:#888882;
      --border:#e0dbd2;
      --radius:1.25rem;
      --shadow:0 24px 64px rgba(26,74,46,.1),0 4px 12px rgba(0,0,0,.04);
      --soft-shadow:0 10px 28px rgba(26,74,46,.08);
      --font-body:'DM Sans',sans-serif;
      --font-display:'Playfair Display',serif;
      --trans:all .22s ease;
    }

    body{
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at 20% 15%, rgba(255,255,255,.58), transparent 42%), radial-gradient(circle at 80% 8%, rgba(255,255,255,.38), transparent 36%), var(--cream);
      color:var(--ink);
      font-family:var(--font-body);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      position:relative;
    }
    body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.06;background-image:repeating-linear-gradient(0deg, rgba(26,26,24,.08) 0, rgba(26,26,24,.08) 1px, transparent 1px, transparent 3px)}

    .container{max-width:1200px;margin:0 auto;padding:2.4rem 2rem 3rem;}

    .glass{
      background:transparent;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:none;
    }

    .topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.1rem;padding:1rem 1.1rem;background:rgba(247,244,239,.92);border:none;border-radius:1rem;backdrop-filter:blur(10px)}
    .topbar-right{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-left:auto}
    .brand{display:flex;align-items:center;gap:.85rem}
    .brand-mark{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-family:var(--font-display);font-size:1.2rem;font-weight:700;box-shadow:0 10px 24px color-mix(in srgb, var(--primary) 28%, transparent)}
    .brand-text{display:flex;flex-direction:column;line-height:1.2;gap:.15rem}
    .brand-text strong{font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-muted);font-weight:500}
    .brand-text span{font-family:var(--font-display);font-size:1.34rem;font-weight:600;letter-spacing:-.01em}

    .week-badge{font-size:.73rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--primary);border:1px solid color-mix(in srgb, var(--primary) 42%, white);background:color-mix(in srgb, var(--primary) 14%, white);padding:.35rem .8rem;border-radius:2rem}

    .toggle{display:flex;gap:.45rem;padding:.35rem;background:var(--white);border:1px solid var(--border);border-radius:2rem;box-shadow:var(--soft-shadow)}
    .toggle button{border:0;background:transparent;border-radius:2rem;padding:.58rem .95rem;font:inherit;font-size:.76rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-mid);cursor:pointer;transition:var(--trans)}
    .toggle button.active{background:var(--primary);color:#fff}

    button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid color-mix(in srgb, var(--accent) 70%, white);outline-offset:2px}

    .hero{padding:1.6rem 1.6rem 1.2rem;margin-bottom:1rem;position:relative;overflow:hidden;border:none}
    .hero::before{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent))}
    .hero-grid{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:end}
    .hero-copy h1{margin:0;font-family:var(--font-display);font-size:clamp(2.45rem,5vw,3.65rem);line-height:1.04;letter-spacing:-.01em;font-style:italic}
    .meta-row{margin-top:1rem}
    .subtle-btn,#clearWeek{border:1px solid color-mix(in srgb, var(--primary) 45%, white);background:transparent;color:var(--primary);padding:.62rem 1rem;border-radius:2rem;font:inherit;font-size:.8rem;font-weight:500;cursor:pointer;transition:var(--trans)}
    .subtle-btn:hover,#clearWeek:hover{background:color-mix(in srgb, var(--primary) 12%, white)}
    #clearWeek{border-style:solid;opacity:1}

    .panel{padding:1.4rem;background:transparent;box-shadow:none}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:.8rem;margin-bottom:1rem}
    .panel h2{margin:0;font-family:var(--font-display);font-size:1.3rem;font-weight:600}
    .panel-content{display:grid;grid-template-rows:1fr;max-height:1000px;opacity:1;overflow:hidden;transition:max-height .35s ease,opacity .2s ease}
    .panel-content.collapsed{max-height:0;opacity:0;pointer-events:none}
    .section-add{border:1px solid color-mix(in srgb, var(--primary) 42%, white);background:color-mix(in srgb, var(--primary) 10%, white);color:var(--primary);border-radius:999px;min-width:2rem;height:2rem;padding:0 .6rem;font:inherit;font-weight:700;cursor:pointer}

    .priority-list{list-style:none;margin:0;padding:0;display:grid;gap:.6rem}

    .main-grid{display:grid;grid-template-columns:1fr;gap:1rem;margin-top:1rem}
    .work-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem;align-items:start}
    .calendar-controls{display:flex;gap:.7rem;flex-wrap:nowrap;margin-bottom:.9rem}
    .calendar-filter,input,select,textarea{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:.75rem;padding:.75rem .9rem;font-family:var(--font-body);font-size:.88rem;color:var(--ink)}
    .calendar-filter{width:180px;min-width:180px;max-width:180px;}

    .calendar-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
    .day{border:1px solid var(--border);border-radius:18px;padding:12px;background:rgba(255,255,255,.5);display:flex;flex-direction:column;gap:10px;min-height:184px;transition:var(--trans)}
    .day.active{border-color:color-mix(in srgb, var(--primary) 50%, white);box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--primary) 35%, white)}
    .day.today{border-color:var(--primary);background:color-mix(in srgb, var(--primary) 9%, white)}
    .day h3{margin:0;font-family:var(--font-display);font-size:1rem}
    .day-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:2px}
    .day-name{font-weight:700;letter-spacing:.04em;font-size:.92rem;text-transform:uppercase;color:var(--ink-mid);padding-right:.45rem}
    .day-date{font-size:.8rem;color:var(--ink-muted);white-space:nowrap;padding-left:.45rem}
    .day-posts{display:grid;gap:8px;min-height:0}
    .post-tile-wrap{position:relative}
    .post-tile{width:100%;border:1px solid var(--border);border-radius:13px;padding:11px;background:rgba(255,255,255,.82);text-align:left;display:grid;gap:8px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.04);transition:var(--trans);font-family:var(--font-body)}
    .post-tile:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.08)}
    .post-tile-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .post-title{font-size:.88rem;font-weight:700;line-height:1.35;word-break:break-word}
    .platform-icons{display:flex;gap:6px;align-items:center;justify-content:flex-end;color:var(--ink-muted);font-size:.74rem}
    .platform-icon{width:15px;height:15px;display:inline-block;color:var(--ink-muted)}
    .post-badges{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .post-status{font-size:.67rem;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;background:color-mix(in srgb, var(--primary) 14%, white);color:var(--primary)}
    .post-meta{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:.75rem;color:var(--ink-muted);flex-wrap:wrap}
    .post-goals{display:flex;gap:6px;flex-wrap:wrap}
    .post-goal{font-size:.68rem;padding:3px 8px;border-radius:999px;background:var(--cream);color:var(--ink-mid);border:1px solid var(--border)}
    .post-actions{position:absolute;left:10px;bottom:10px;display:flex;gap:6px;opacity:0;pointer-events:none;transition:var(--trans)}
    .post-tile-wrap:hover .post-actions,.post-tile-wrap:focus-within .post-actions{opacity:1;pointer-events:auto}
    .post-action{border:1px solid var(--border);background:rgba(255,255,255,.92);color:var(--ink-mid);width:26px;height:26px;border-radius:6px;display:grid;place-items:center;font-size:.82rem;line-height:1;cursor:pointer;transition:var(--trans)}
    .post-action:hover{background:#fff;border-color:color-mix(in srgb, var(--primary) 35%, white);color:var(--primary)}
    .post-delete:hover{border-color:#ef4444;color:#b91c1c}
    /* ── Today badge ──────────────────────────────────────────── */
    .day-today-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:var(--primary);color:#fff;vertical-align:middle;margin-left:6px}
    /* ── Post tile platform accent borders + icon colors ──────── */
    .post-tile.platform-linkedin{border-left:3px solid #0a66c2}
    .post-tile.platform-facebook{border-left:3px solid #1877f2}
    .post-tile.platform-instagram{border-left:3px solid #c13584}
    .post-tile.platform-linkedin .platform-icon{color:#0a66c2}
    .post-tile.platform-facebook .platform-icon{color:#1877f2}
    .post-tile.platform-instagram .platform-icon{color:#c13584}
    /* ── Project progress bar ─────────────────────────────────── */
    .project-progress-wrap{height:4px;border-radius:99px;background:var(--border);overflow:hidden;margin-top:8px}
    .project-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),color-mix(in srgb, var(--primary) 60%, white));transition:width .4s cubic-bezier(.4,0,.2,1)}
    .project-progress-label{font-size:.65rem;color:var(--ink-muted);margin-top:3px}
    /* ── Panel chevron animation ──────────────────────────────── */
    .panel-chevron{display:block;transition:transform .25s cubic-bezier(.4,0,.2,1)}
    .section-add.panel-open .panel-chevron{transform:rotate(180deg)}
    /* ── Empty states ─────────────────────────────────────────── */
    .day-empty{display:flex;align-items:center;justify-content:center;min-height:52px;padding:14px 8px;color:var(--ink-muted);font-size:.77rem;text-align:center;border:1.5px dashed var(--border);border-radius:10px;line-height:1.4}
    .todo-empty{color:var(--ink-muted);font-size:.82rem;padding:10px 2px;text-align:center;opacity:.8}

    .new-task-btn,.project-add{border:1px dashed color-mix(in srgb, var(--primary) 48%, white);background:color-mix(in srgb, var(--primary) 10%, white);color:var(--primary);padding:.7rem 1rem;border-radius:.85rem;font:inherit;font-weight:600;cursor:pointer}
    #newTaskBtn,.project-add{justify-self:start;align-self:start;width:auto;padding:.5rem .85rem;border-style:solid;background:transparent;font-weight:500;font-size:.82rem;opacity:.9}
    .todo-list,.project-grid{display:grid;gap:12px}
    #todosContent{display:grid;grid-template-columns:1fr;gap:12px}
    .todo-item{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;align-items:center;gap:12px;padding:12px 13px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.86);box-shadow:0 4px 12px rgba(0,0,0,.04);cursor:pointer}
    .todo-item input[type='checkbox']{width:auto;accent-color:var(--primary)}
    .todo-item.done .todo-name{text-decoration:line-through;color:#94a3b8}
    .todo-name{font-size:.95rem;line-height:1.35;word-break:break-word;padding-right:.6rem}
    .todo-priority-badge{font-size:.67rem;padding:4px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;background:var(--cream);border:1px solid var(--border)}
    .todo-priority-badge.high{background:#fee2e2;color:#991b1b}
    .todo-priority-badge.medium{background:#fef3c7;color:#92400e}
    .todo-priority-badge.low{background:#dcfce7;color:#166534}
    .todo-delete,.icon-delete-btn{border:1px solid var(--border);background:rgba(255,255,255,.96);color:var(--ink-muted);width:30px;height:30px;border-radius:9px;display:grid;place-items:center;cursor:pointer;transition:var(--trans);padding:0}
    .todo-delete:hover,.icon-delete-btn:hover{background:#fff;color:#c2410c;border-color:#fdba74;transform:translateY(-1px)}
    .icon-delete-btn{width:auto;min-width:30px;padding:.35rem .55rem;display:inline-flex;gap:.35rem;align-items:center;font-size:.8rem;font-weight:500}
    .project-todos{display:grid;gap:.6rem}
    .project-todo-item{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:.55rem}
    .project-todo-item input[type='checkbox']{width:auto;margin:0;accent-color:var(--primary)}
    .project-todo-item input[type='text']{width:100%}
    .project-todo-item.done input[type='text']{text-decoration:line-through;color:#94a3b8}
    .project-actions{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-top:.2rem}
    .project-action-btn{width:100%;display:inline-flex;justify-content:center;align-items:center;gap:.4rem;padding:.62rem .85rem;border-style:solid;background:transparent;font-size:.9rem;font-weight:600}
    .project-action-btn svg{flex-shrink:0}

    .theme-toggle-fab{position:fixed;right:1.2rem;bottom:1.2rem;z-index:35;border:1px solid color-mix(in srgb, var(--primary) 45%, white);background:rgba(255,253,249,.95);color:var(--ink);border-radius:999px;padding:.58rem .9rem;display:inline-flex;align-items:center;gap:.45rem;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;box-shadow:0 10px 22px rgba(0,0,0,.12);backdrop-filter:blur(6px);transition:var(--trans)}
    .theme-toggle-fab:hover{transform:translateY(-1px);background:#fff}

    body.dark-mode{
      --cream:#121314;
      --white:#1a1d20;
      --ink:#eceff3;
      --ink-mid:#d2d7de;
      --ink-muted:#97a3b2;
      --border:#334155;
      --shadow:0 24px 64px rgba(0,0,0,.45),0 4px 12px rgba(0,0,0,.3);
      --soft-shadow:0 10px 28px rgba(0,0,0,.32);
    }
    body.dark-mode .topbar{background:rgba(25,28,32,.9)}
    body.dark-mode .day,
    body.dark-mode .post-tile,
    body.dark-mode .todo-item,
    body.dark-mode .project-tile,
    body.dark-mode .recurring-row,
    body.dark-mode .modal-card,
    body.dark-mode .linked-task,
    body.dark-mode .todo-delete,
    body.dark-mode .icon-delete-btn,
    body.dark-mode .theme-toggle-fab{background:rgba(21,24,28,.92)}
    body.dark-mode .modal{background:rgba(0,0,0,.6)}
    .project-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .project-tile{min-height:148px;border-radius:16px;border:1px solid var(--border);background:rgba(255,253,249,.88);display:grid;align-content:space-between;gap:10px;padding:14px;text-align:left;cursor:pointer;transition:var(--trans);font-family:var(--font-body)}
    .project-tile:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.08)}
    .project-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .project-name{font-weight:700;font-size:.95rem;line-height:1.35;word-break:break-word;flex:1}
    .project-deadline{font-size:.74rem;color:var(--ink-muted);white-space:nowrap;margin-left:auto}
    .project-status{justify-self:start;font-size:.67rem;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;background:var(--cream);border:1px solid var(--border)}
    .project-status[data-state='in progress']{background:#ffedd5;color:#9a3412}
    .project-status[data-state='completed']{background:#dcfce7;color:#166534}
    .project-status[data-state='strategizing']{background:#dbeafe;color:#1d4ed8}
    .project-status[data-state='on hold']{background:#fef9c3;color:#854d0e}
    .project-status[data-state='not started']{background:#e2e8f0;color:#334155}
    .linked-task-list{display:grid;gap:8px}
    .linked-task{display:flex;justify-content:space-between;gap:8px;padding:8px 9px;border:1px dashed var(--border);border-radius:10px;font-size:.82rem;background:rgba(248,250,252,.72)}
    .linked-task span:last-child{font-weight:700}
    .due-badge{justify-self:start;align-self:flex-start;display:inline-flex;width:fit-content;font-size:.63rem;padding:3px 8px;background:#fee2e2;color:#991b1b;text-transform:uppercase;border-radius:999px}
    .due-badge.week{background:#fef3c7;color:#92400e}
    .recurring-list{display:grid;gap:6px}
    .recurring-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--border);border-radius:10px;background:rgba(255,253,249,.88);transition:var(--trans)}
    .recurring-row:hover{border-color:color-mix(in srgb, var(--primary) 30%, white)}
    .recurring-row.done .recurring-name-edit{text-decoration:line-through;opacity:.45}
    .recurring-check{width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:var(--primary)}
    .recurring-name-edit{flex:1;font:inherit;font-size:.88rem;font-weight:500;color:var(--ink);background:transparent;border:none;outline:none;min-width:0;cursor:text;border-radius:4px;padding:1px 4px;transition:background .15s}
    .recurring-name-edit:focus{background:rgba(255,255,255,.7);outline:2px solid color-mix(in srgb, var(--primary) 40%, transparent);outline-offset:0}
    .recurring-name-edit:empty::before{content:attr(data-placeholder);color:var(--ink-muted);pointer-events:none}
    .recurring-freq-badge{flex-shrink:0;padding:3px 9px;border-radius:999px;font:inherit;font-size:.67rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:color-mix(in srgb, var(--primary) 12%, white);color:var(--primary);border:1px solid color-mix(in srgb, var(--primary) 20%, white);cursor:pointer;transition:var(--trans)}
    .recurring-freq-badge:hover{background:color-mix(in srgb, var(--primary) 22%, white)}
    .recurring-del-btn{flex-shrink:0;width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--ink-muted);display:grid;place-items:center;cursor:pointer;opacity:0;transition:var(--trans)}
    .recurring-row:hover .recurring-del-btn,.recurring-row:focus-within .recurring-del-btn{opacity:1}
    .recurring-del-btn:hover{background:#fee2e2;color:#b91c1c}
    .recurring-empty{color:var(--ink-muted);font-size:.82rem;padding:10px 2px;text-align:center;opacity:.8}

    .badge,.priority-badge,.status-badge,.due-badge,.project-status-option,.tag-chip,.status-tag,.tag,.platform-badge,.post-type-tag{border-radius:999px;padding:.25rem .62rem;font-size:.67rem;letter-spacing:.05em;text-transform:uppercase;border:1px solid transparent}
    .status-badge,.project-status-option.active,.status-tag.active,.toggle button.active{background:var(--primary);color:#fff}
    .priority-badge.high,.due-badge.overdue{background:#fee2e2;color:#991b1b}
    .priority-badge.medium,.due-badge.week{background:#fef3c7;color:#92400e}
    .priority-badge.low{background:#dcfce7;color:#166534}

    .post-type-tag{border-color:transparent}
    .post-type-perm-job-ad{background:#dbeafe;color:#1d4ed8}
    .post-type-team-culture-post{background:#fce7f3;color:#9d174d}
    .post-type-blog-post{background:#ede9fe;color:#5b21b6}
    .post-type-anniversary-post{background:#ffedd5;color:#9a3412}
    .post-type-video-post{background:#dcfce7;color:#166534}
    .post-type-holiday-post{background:#fef3c7;color:#92400e}
    .post-type-contract-job-ad{background:#e0f2fe;color:#0c4a6e}
    .post-type-announcement-post{background:#e2e8f0;color:#334155}


    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:1rem;background:rgba(26,26,24,.45);z-index:40}
    .modal.open{display:flex}
    .modal-card{width:min(760px,100%);padding:1.5rem;border-radius:1.1rem;border:1px solid var(--border);background:rgba(255,255,255,.9);box-shadow:0 28px 70px rgba(26,74,46,.18)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:.8rem}
    .modal-head h2{margin:0;font-family:var(--font-display);font-size:1.3rem}
    .close-btn{border:0;background:transparent;color:var(--ink-muted);font-size:1.6rem;cursor:pointer}
    .fields{margin-top:1rem;display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
    .field-group,.platform-block,.status-block{display:grid;gap:.35rem}
    .field-group label,.platform-block strong,.status-block strong{font-size:.74rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted)}
    .full,.field-hint{grid-column:1 / -1}
    .field-hint{margin:0;color:var(--ink-muted);font-size:.87rem}
    .tag-picker,.status-picker,.project-status-options,.work-tags{display:flex;flex-wrap:wrap;gap:.45rem}
    .tag-chip,.status-tag,.project-status-option{background:var(--cream);color:var(--ink-mid);border-color:var(--border)}
    .platform-chip{width:40px;height:40px;padding:0;border-radius:12px;display:grid;place-items:center;color:#475569;background:rgba(255,255,255,.9)}
    .platform-chip svg{width:20px;height:20px}
    .platform-chip[data-platform='LinkedIn']{color:#0a66c2}
    .platform-chip[data-platform='Facebook']{color:#1877f2}
    .platform-chip[data-platform='Instagram']{color:#c13584}
    .platform-chip.active{background:var(--primary);color:#fff;border-color:transparent;box-shadow:0 8px 16px color-mix(in srgb, var(--primary) 28%, transparent)}

    /* ── Top grid ─────────────────────────────────────────── */
    .top-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start}
    .day-cal-controls{display:flex;align-items:center;gap:.45rem}
    .day-cal-label{font-size:.8rem;font-weight:600;color:var(--ink-mid);white-space:nowrap;min-width:64px;text-align:center}
    .day-cal-total{font-size:.72rem;color:var(--ink-muted);padding-left:.15rem}
    /* ── Time grid ─────────────────────────────────────────── */
    .time-grid-wrap{overflow-y:auto;max-height:520px;border:1px solid var(--border);border-radius:.75rem;background:rgba(255,255,255,.35)}
    .time-grid{position:relative;user-select:none}
    .time-line{position:absolute;left:0;right:0;pointer-events:none}
    .time-line.hour-line{border-top:1px solid var(--border)}
    .time-line.half-line{border-top:1px dashed color-mix(in srgb,var(--border) 55%,transparent)}
    .time-line.quarter-line{border-top:1px dashed color-mix(in srgb,var(--border) 22%,transparent)}
    .time-label{position:absolute;left:4px;top:0;transform:translateY(-50%);font-size:.62rem;color:var(--ink-muted);font-weight:500;white-space:nowrap;pointer-events:none}
    .time-drop-zone{position:absolute;left:44px;right:0;top:0;bottom:0;cursor:crosshair;z-index:1}
    .time-now-line{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:5;pointer-events:none}
    .time-now-line::before{content:'';position:absolute;left:42px;top:-4px;width:8px;height:8px;background:#ef4444;border-radius:50%}
    /* ── Blocks ────────────────────────────────────────────── */
    .cal-block{position:absolute;left:48px;right:4px;border-radius:8px;padding:4px 8px 10px;font-size:.75rem;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:2;overflow:hidden;transition:box-shadow .15s,transform .1s;min-height:20px}
    .cal-block:hover{box-shadow:0 4px 16px rgba(0,0,0,.18);transform:translateX(-1px)}
    .cal-block.is-dragging{opacity:.7;cursor:grabbing;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.22)}
    .cal-block-title{font-weight:600;line-height:1.25;word-break:break-word}
    .cal-block-meta{font-size:.65rem;opacity:.7;margin-top:2px}
    .cal-block-resize{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;border-radius:0 0 8px 8px}
    .cal-block-resize:hover{background:rgba(0,0,0,.07)}
    /* ── Ghost ─────────────────────────────────────────────── */
    .cal-ghost{position:absolute;left:48px;right:4px;border-radius:8px;background:color-mix(in srgb,var(--primary) 12%,white);border:2px dashed color-mix(in srgb,var(--primary) 55%,white);pointer-events:none;z-index:6;display:flex;align-items:center;justify-content:center}
    .cal-ghost-label{font-size:.72rem;font-weight:600;color:var(--primary);white-space:nowrap}
    /* ── Block colours ──────────────────────────────────────── */
    .cal-block-blue{background:#dbeafe;color:#1e40af;border-left:3px solid #3b82f6}
    .cal-block-green{background:#dcfce7;color:#166534;border-left:3px solid #22c55e}
    .cal-block-amber{background:#fef3c7;color:#92400e;border-left:3px solid #f59e0b}
    .cal-block-red{background:#fee2e2;color:#991b1b;border-left:3px solid #ef4444}
    .cal-block-purple{background:#ede9fe;color:#5b21b6;border-left:3px solid #8b5cf6}
    .cal-block-slate{background:#e2e8f0;color:#334155;border-left:3px solid #64748b}
    /* ── Colour picker ──────────────────────────────────────── */
    .block-color-picker{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .color-chip{width:24px;height:24px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0}
    .color-chip:hover{transform:scale(1.2)}
    .color-chip.active{border-color:var(--ink)}
    .color-chip-blue{background:#3b82f6}.color-chip-green{background:#22c55e}.color-chip-amber{background:#f59e0b}.color-chip-red{background:#ef4444}.color-chip-purple{background:#8b5cf6}.color-chip-slate{background:#64748b}
    /* ── Block modal ────────────────────────────────────────── */
    .block-modal-card{width:min(480px,100%)}
    /* ── Dark mode: day planner ─────────────────────────────── */
    body.dark-mode .time-grid-wrap{background:rgba(15,17,21,.55)}
    body.dark-mode .cal-block-blue{background:#1e3a5f;color:#93c5fd}
    body.dark-mode .cal-block-green{background:#14532d;color:#86efac}
    body.dark-mode .cal-block-amber{background:#451a03;color:#fcd34d}
    body.dark-mode .cal-block-red{background:#450a0a;color:#fca5a5}
    body.dark-mode .cal-block-purple{background:#2e1065;color:#c4b5fd}
    body.dark-mode .cal-block-slate{background:#1e293b;color:#cbd5e1}
    body.dark-mode .cal-ghost{background:color-mix(in srgb,var(--primary) 22%,#1a1d20)}

    @media (max-width:1100px){
      .calendar-board{grid-template-columns:repeat(3,minmax(0,1fr))}
      .project-grid{grid-template-columns:1fr}
    }
    @media (max-width:820px){
      .container{padding:1rem .9rem 1.6rem}
      .topbar{padding:.8rem}
      .calendar-board{grid-template-columns:repeat(2,minmax(0,1fr))}
      .work-grid{grid-template-columns:1fr}
      .top-grid{grid-template-columns:1fr}
      .fields{grid-template-columns:1fr}
      .hero-grid{grid-template-columns:1fr}
      #clearWeek{justify-self:start}
    }
    @media (max-width:560px){
      .toggle{width:100%}
      .toggle button{flex:1}
      .calendar-controls{gap:.5rem}
      .calendar-filter{width:calc(50% - .25rem);min-width:0;max-width:none}
      .calendar-board{grid-template-columns:1fr}
      .project-actions{grid-template-columns:1fr}
      .theme-toggle-fab{right:.8rem;bottom:.8rem}
    }
</style>
</head>
<body>
  <main class="container">

    <section class="work-grid">

              <button type="button" class="tag-chip platform-chip" data-platform="Facebook" aria-label="Facebook" title="Facebook"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13.35 20v-7.28h2.45l.37-2.84h-2.82V8.06c0-.83.23-1.39 1.42-1.39h1.51V4.13A20.4 20.4 0 0 0 14.58 4c-2.18 0-3.67 1.33-3.67 3.78v2.1H8.44v2.84h2.47V20h2.44Z"/></svg></button>

  <button type="button" id="themeToggle" class="theme-toggle-fab" aria-pressed="false" aria-label="Toggle dark mode"><span id="themeToggleIcon" aria-hidden="true">🌙</span><span id="themeToggleLabel">Dark mode</span></button>

  <script>
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
    const STORAGE_KEY = "weekly-planner-v5";
    const BRANDS = ["is", "as", "ad"];
    const DAY_CAL_START_MIN = 7 * 60;   // 7:00 AM
    const DAY_CAL_END_MIN   = 20 * 60;  // 8:00 PM
    const PX_PER_MIN        = 1;        // 1px = 1 min → 60px/hour
    const SNAP_MIN          = 15;       // snap to 15-min grid
    const BLOCK_COLORS      = ["blue","green","amber","red","purple","slate"];
    const DEFAULT_BLOCK_COLOR = "blue";

    const calendar = document.getElementById("calendar");
    const weekBadge = document.getElementById("weekBadge");
    const brandSubtitle = document.getElementById("brandSubtitle");
    const brandMark = document.getElementById("brandMark");
    const editorModal = document.getElementById("editorModal");
    const closeModal = document.getElementById("closeModal");
    const projectModal = document.getElementById("projectModal");
    const closeProjectModal = document.getElementById("closeProjectModal");
    const todoModal = document.getElementById("todoModal");
    const closeTodoModal = document.getElementById("closeTodoModal");
    const deleteTodoTaskBtn = document.getElementById("deleteTodoTaskBtn");

    const recurringContent = document.getElementById("recurringContent");

    function emptyBrandState() {

    function weekContext(date = new Date()) {
      const day = date.getDay();
      const diffToMonday = (day + 6) % 7;
      const monday = new Date(date);
      monday.setHours(0,0,0,0);
      monday.setDate(date.getDate() - diffToMonday);

      const datesByDay = {};
      DAYS.forEach((dayName, index) => {
        const current = new Date(monday);
        current.setDate(monday.getDate() + index);
        datesByDay[dayName] = current;
      });

      const activeWeekday = day >= 1 && day <= 5 ? DAYS[day - 1] : null;

      return {
        monday,
        datesByDay,
        activeWeekday
      };
    }

    function formatWeekOf(date = new Date()) {
      const { monday } = weekContext(date);
      return monday.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function setSavedLabel() {}

    function dayPosts(day = state.selectedDay) {
      const posts = state.data[state.brand].posts;
      const existing = posts[day];
      if (Array.isArray(existing)) return existing;
      if (existing && typeof existing === "object") {
        posts[day] = [existing];
        return posts[day];
      }
      posts[day] = [];
      return posts[day];
    }

    function currentPost(createIfMissing = true) {
      const postsForDay = dayPosts();
      if (!postsForDay[state.selectedPostIndex]) {
        if (!createIfMissing) return {};
        postsForDay[state.selectedPostIndex] = {};
      }
      return postsForDay[state.selectedPostIndex];
    }

    function normalizePosts(posts) {
      const normalized = {};
      DAYS.forEach((day) => {
        const value = posts && posts[day];
        if (Array.isArray(value)) normalized[day] = value.filter((item) => item && typeof item === "object");
        else if (value && typeof value === "object") normalized[day] = [value];
        else normalized[day] = [];
      });
      return normalized;
    }

    function getWeekKey(date = new Date()) {
      const { monday } = weekContext(date);
      const year = monday.getFullYear();
      const month = String(monday.getMonth() + 1).padStart(2, "0");
      const day = String(monday.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function readSavedState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      try {
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        console.warn("Saved planner data was corrupted and could not be parsed.");
        return {};
      }
    }

    function normalizeSharedBrand(source) {
      const projects = Array.isArray(source.projects) ? source.projects.map((project) => ({
        id: String((project && project.id) || makeId("project")),
        name: String((project && project.name) || ""),
        status: normalizeProjectStatus((project && project.status) || "in progress"),
        deadline: String((project && project.deadline) || "")
      })) : [];
      const projectIds = new Set(projects.map((project) => project.id));
      const todos = Array.isArray(source.todos) ? [...source.todos] : [];

      projects.forEach((project, projectIndex) => {
        const legacyTodos = Array.isArray(source.projects && source.projects[projectIndex] && source.projects[projectIndex].todos)
          ? source.projects[projectIndex].todos
          : [];
        legacyTodos.forEach((todo) => {
          if (!todo || typeof todo !== "object") return;
          todos.push({ text: todo.text || "", done: Boolean(todo.done), priority: "medium", projectId: project.id });
        });
      });

      if (todos.length === 0) todos.push({ text: "", done: false, priority: "medium", projectId: "" });
      const recurringTasks = Array.isArray(source.recurringTasks) ? source.recurringTasks : [];
      if (recurringTasks.length === 0) recurringTasks.push({ text: "", done: false, frequency: "weekly", dueDate: "", timePeriod: "anytime", status: "in progress" });
      return {
        todos: todos.map((todo) => ({
          text: String((todo && todo.text) || ""),
          done: Boolean(todo && todo.done),
          priority: normalizeTodoPriority(todo && todo.priority),
          projectId: projectIds.has(String(todo && todo.projectId || "")) ? String(todo && todo.projectId || "") : ""
        })),
        recurringTasks: recurringTasks.map((task) => ({
          text: String((task && task.text) || ""),
          done: Boolean(task && task.done),
          frequency: normalizeRecurringFrequency(task && task.frequency),
          dueDate: String((task && task.dueDate) || ""),
          timePeriod: normalizeRecurringPeriod(task && task.timePeriod),
          status: normalizeRecurringStatus(task && task.status)
        })),
        projects,
        daySchedule: normalizeDaySchedule(source.daySchedule)
      };
    }

    function normalizeDaySchedule(raw) {
      if (!raw || typeof raw !== "object") return {};
      return Object.fromEntries(Object.entries(raw).map(([k, arr]) => [k,
        Array.isArray(arr) ? arr.map((b) => ({
          id: String(b.id || makeId("block")),
          title: String(b.title || ""),
          startMin: (typeof b.startMin === "number") ? b.startMin : 9 * 60,
          durationMin: (typeof b.durationMin === "number" && b.durationMin >= 15) ? b.durationMin : 60,
          color: BLOCK_COLORS.includes(b.color) ? b.color : DEFAULT_BLOCK_COLOR,
          note: String(b.note || "")
        })) : []
      ]));
    }

    function normalizeWeeklyBrand(source) {
      const priorities = Array.isArray(source.priorities) ? source.priorities.slice(0, 3) : listItems(source.priorities).slice(0, 3);
      while (priorities.length < 3) priorities.push("");
      return { priorities, posts: normalizePosts(source.posts) };
    }

    function withinCurrentWeek(dateValue) {
      if (!dateValue) return null;
      const date = new Date(`${dateValue}T00:00:00`);
      if (Number.isNaN(date.getTime())) return null;
      const { monday } = weekContext();
      const weekStart = new Date(monday);
      const weekEnd = new Date(monday);
      weekEnd.setDate(weekStart.getDate() + 6);
      if (date < weekStart) return "overdue";
      if (date <= weekEnd) return "week";
      return null;
    }

    function persist() {
      const existing = readSavedState();
      const weekKey = getWeekKey();
      const shared = existing.shared && typeof existing.shared === "object" ? existing.shared : {};
      const weeks = existing.weeks && typeof existing.weeks === "object" ? existing.weeks : {};
      const weekData = weeks[weekKey] && typeof weeks[weekKey] === "object" ? weeks[weekKey] : {};

      BRANDS.forEach((brand) => {
        const brandState = state.data[brand] || emptyBrandState();
        const normalizedShared = normalizeSharedBrand(brandState);
        const normalizedWeekly = normalizeWeeklyBrand(brandState);
        shared[brand] = normalizedShared;
        weekData[brand] = normalizedWeekly;
      });

      weeks[weekKey] = weekData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ shared, weeks }));
      setSavedLabel("Saved");
    }

    function listItems(textOrArray) {
      if (Array.isArray(textOrArray)) return textOrArray.map((line) => String(line || "").trim()).filter(Boolean);
      return String(textOrArray || "").split(/\n+/).map((line) => line.replace(/^[-•\s]+/, "").trim()).filter(Boolean);
    }

    function load() {
      const parsed = readSavedState();
      if (!Object.keys(parsed).length) return;
      try {
        const weekKey = getWeekKey();
        const sharedRoot = parsed.shared && typeof parsed.shared === "object" ? parsed.shared : null;
        const weekRoot = parsed.weeks && parsed.weeks[weekKey] && typeof parsed.weeks[weekKey] === "object" ? parsed.weeks[weekKey] : null;
        const legacyState = (!sharedRoot && !weekRoot) ? (parsed[weekKey] || parsed) : null;

        BRANDS.forEach((brand) => {
          const sharedSource = sharedRoot ? (sharedRoot[brand] || {}) : (legacyState ? legacyState[brand] || {} : {});
          const weeklySource = weekRoot ? (weekRoot[brand] || {}) : (legacyState ? legacyState[brand] || {} : {});
          state.data[brand] = {
            ...emptyBrandState(),
            ...normalizeSharedBrand(sharedSource),
            ...normalizeWeeklyBrand(weeklySource)
          };
        });
      } catch {
        console.warn("Unable to parse saved social plan data.");
      }
    }

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark-mode", isDark);
      themeToggle.setAttribute("aria-pressed", String(isDark));
      themeToggleLabel.textContent = isDark ? "Light mode" : "Dark mode";
      themeToggleIcon.textContent = isDark ? "☀️" : "🌙";
    }

    function loadThemePreference() {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      applyTheme(savedTheme === "dark" ? "dark" : "light");
    }

    function openEditor(day, postIndex = null) {
      restoreFocusTo = document.activeElement;
      state.selectedDay = day;
      if (postIndex == null) state.selectedPostIndex = dayPosts(day).length;
      else state.selectedPostIndex = postIndex;
      editorModal.classList.add("open");
      editorModal.setAttribute("aria-hidden", "false");
      render();
      setTimeout(() => fields.postTitle.focus(), 0);
    }

      if (normalized === "planned") return "status-planned";
      if (normalized === "scheduled") return "status-scheduled";
      if (normalized === "in progress") return "status-in-progress";
      if (normalized === "posted") return "status-posted";
      return "";
    }

    function postTypeClass(postType) {
      return `post-type-${String(postType || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, "-")}`;

    function platformIcons(platforms) {

        if (key === "instagram") return '<span class="platform-icon" title="Instagram" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.8"/><circle cx="17.6" cy="6.4" r="1" fill="currentColor" stroke="none"/></svg></span>';
