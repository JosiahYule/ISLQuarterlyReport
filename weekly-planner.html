<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{
      --bg:#f6f7f8;
      --surface:#ffffff;
      --surface-soft:#f2f4f7;
      --text:#121417;
      --muted:#667085;
      --border:#dde2e8;
      --primary:#0f4c81;
      --primary-soft:#eaf3fb;
      --danger:#b42318;
      --radius:14px;
      --radius-sm:10px;
      --shadow:0 8px 24px rgba(16,24,40,.06);
      --font-body:'DM Sans',system-ui,sans-serif;
      --font-display:'Playfair Display',serif;
      --trans:180ms ease;
    }

    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.5;-webkit-font-smoothing:antialiased}
    .container{max-width:1240px;margin:0 auto;padding:1.35rem}
    .glass{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hidden{display:none !important}

    .topbar{position:sticky;top:.75rem;z-index:20;display:flex;gap:.9rem;align-items:center;justify-content:space-between;flex-wrap:wrap;padding:.9rem 1rem;margin-bottom:1rem;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px}
    .topbar-right{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-left:auto}
    .brand{display:flex;align-items:center;gap:.75rem}
    .brand-mark{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:var(--primary);color:#fff;font-size:1rem;font-weight:700}
    .brand-text{display:flex;flex-direction:column;line-height:1.1;gap:.2rem}
    .brand-text strong{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
    .brand-text span{font-family:var(--font-display);font-size:1.2rem}
    .week-badge{font-size:.72rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--border);padding:.34rem .7rem;border-radius:999px;color:var(--muted);background:var(--surface-soft)}

    .panel{padding:1rem}
    .panel h2{margin:0;font-size:1.02rem;letter-spacing:.01em}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.85rem;flex-wrap:wrap}
    .panel-content{display:grid;grid-template-rows:1fr;max-height:1200px;opacity:1;overflow:hidden;transition:max-height .25s ease,opacity .2s ease}
    .panel-content.collapsed{max-height:0;opacity:0;pointer-events:none}

    .toggle{display:inline-flex;background:var(--surface-soft);padding:.22rem;border-radius:999px;border:1px solid var(--border)}
    .toggle button{border:0;background:transparent;border-radius:999px;padding:.42rem .72rem;font:inherit;font-size:.73rem;color:var(--muted);font-weight:600;cursor:pointer;transition:var(--trans)}
    .toggle button.active{background:var(--primary);color:#fff}

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    input,select,textarea{width:100%;border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:.62rem .72rem;color:var(--text)}
    button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid rgba(15,76,129,.28);outline-offset:2px}
    .section-add,.subtle-btn,#clearWeek,.new-task-btn,.project-add,.project-action-btn,.todo-delete,.icon-delete-btn,.post-action,.ms-auth-btn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:.45rem .62rem;transition:var(--trans)}
    .section-add{min-width:2rem;height:2rem;padding:0 .55rem;font-weight:700;border-radius:999px}
    .section-add:hover,.subtle-btn:hover,.new-task-btn:hover,.project-add:hover,.project-action-btn:hover,.todo-delete:hover,.icon-delete-btn:hover,.post-action:hover,.ms-auth-btn:hover{border-color:#bcc5d1;background:var(--surface-soft)}
    .subtle-btn,#clearWeek{border-radius:999px;padding:.48rem .85rem}
    .project-add{width:auto;font-size:.82rem}

    .main-grid,.work-grid{display:grid;gap:1rem}
    .work-grid{grid-template-columns:1.2fr 1fr}

    .calendar-controls{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:.8rem}
    .calendar-filter{width:170px;min-width:170px}
    .calendar-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.7rem}
    .day{border:1px solid var(--border);border-radius:12px;padding:.72rem;background:var(--surface);display:flex;flex-direction:column;gap:.55rem;min-height:170px}
    .day.active{border-color:#b8c9da}
    .day.today{border-color:var(--primary);background:var(--primary-soft)}
    .day-head{display:flex;justify-content:space-between;gap:.4rem;align-items:flex-start}
    .day-name{font-size:.79rem;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--muted)}
    .day-date{font-size:.77rem;color:var(--muted)}
    .day-posts{display:grid;gap:.5rem}
    .day-empty,.todo-empty,.recurring-empty{border:1px dashed var(--border);border-radius:10px;padding:.7rem .55rem;font-size:.78rem;color:var(--muted);text-align:center}

    .post-tile-wrap{position:relative}
    .post-tile{width:100%;border:1px solid var(--border);border-radius:10px;padding:.62rem;background:var(--surface);text-align:left;display:grid;gap:.42rem;cursor:pointer}
    .post-tile-top,.post-meta{display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem;flex-wrap:wrap}
    .post-title{font-size:.86rem;font-weight:700;line-height:1.3}
    .platform-icons{display:flex;gap:6px;color:var(--muted)}
    .platform-icon{width:14px;height:14px;display:inline-block}
    .post-badges,.post-goals{display:flex;flex-wrap:wrap;gap:.35rem}
    .post-status,.post-goal,.todo-priority-badge,.project-status,.due-badge,.recurring-freq-badge,.post-type-tag,.badge,.priority-badge,.status-badge,.status-tag,.project-status-option,.tag-chip,.platform-badge{display:inline-flex;align-items:center;gap:.25rem;border-radius:999px;font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;padding:.2rem .5rem;border:1px solid var(--border);background:var(--surface-soft);color:var(--muted)}
    .post-actions{position:absolute;left:8px;bottom:8px;display:flex;gap:.35rem;opacity:0;pointer-events:none}
    .post-tile-wrap:hover .post-actions,.post-tile-wrap:focus-within .post-actions{opacity:1;pointer-events:auto}
    .post-action{width:24px;height:24px;padding:0;display:grid;place-items:center}
    .post-delete:hover{border-color:#f3c3bf;color:var(--danger)}
    .day-today-badge{font-size:.6rem;padding:2px 6px;border-radius:999px;background:var(--primary);color:#fff}
    .post-tile.platform-linkedin{border-left:3px solid #0a66c2}.post-tile.platform-facebook{border-left:3px solid #1877f2}.post-tile.platform-instagram{border-left:3px solid #c13584}
    .post-tile.platform-linkedin .platform-icon{color:#0a66c2}.post-tile.platform-facebook .platform-icon{color:#1877f2}.post-tile.platform-instagram .platform-icon{color:#c13584}

    .project-grid,.todo-list,.priority-list,.recurring-list,.linked-task-list,.project-todos{display:grid;gap:.6rem}
    .project-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    #todosContent{display:grid;grid-template-columns:1fr;gap:.6rem}
    .project-tile,.todo-item,.recurring-row,.linked-task{border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:.7rem}
    .todo-item{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;align-items:center;gap:.55rem;cursor:pointer}
    .todo-item.done .todo-name,.project-todo-item.done input[type='text'],.recurring-row.done .recurring-name-edit{text-decoration:line-through;opacity:.6}
    .todo-name{font-size:.9rem}
    .todo-item input[type='checkbox'],.project-todo-item input[type='checkbox'],.recurring-check{width:auto;accent-color:var(--primary)}
    .project-head{display:flex;justify-content:space-between;gap:.5rem}
    .project-name{font-weight:700}
    .project-deadline,.project-progress-label,.field-hint,.day-cal-total,.ms-signout-btn,.time-label,.cal-block-meta{font-size:.75rem;color:var(--muted)}
    .project-status[data-state='completed'],.todo-priority-badge.low,.priority-badge.low{background:#ecfdf3;color:#027a48;border-color:#a6f4c5}
    .project-status[data-state='in progress'],.todo-priority-badge.medium,.priority-badge.medium,.due-badge.week{background:#fffaeb;color:#b54708;border-color:#fedf89}
    .project-status[data-state='strategizing'],.post-type-perm-job-ad{background:#eff8ff;color:#175cd3;border-color:#b2ddff}
    .project-status[data-state='on hold']{background:#fef3f2;color:#b42318;border-color:#fecdca}
    .project-status[data-state='not started'],.post-type-announcement-post{background:#f2f4f7;color:#344054}
    .priority-badge.high,.due-badge.overdue,.todo-priority-badge.high{background:#fef3f2;color:#b42318;border-color:#fecdca}

    .project-progress-wrap{height:5px;border-radius:999px;background:var(--surface-soft);overflow:hidden}
    .project-progress-fill{height:100%;background:var(--primary)}
    .project-actions{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-top:.4rem}
    .icon-delete-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem}
    .project-todo-item{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:.5rem;align-items:center}
    .project-todo-item input[type='text'],.recurring-name-edit{border:none;background:transparent;padding:.2rem .3rem}
    .recurring-row{display:flex;align-items:center;gap:.55rem}
    .recurring-del-btn{margin-left:auto;border:none;background:transparent;color:var(--muted);padding:.2rem .35rem;border-radius:6px;opacity:0}
    .recurring-row:hover .recurring-del-btn,.recurring-row:focus-within .recurring-del-btn{opacity:1}

    .day-cal-controls{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
    .day-cal-label{font-size:.8rem;font-weight:600;color:var(--text);min-width:64px;text-align:center}
    .time-grid-wrap{overflow-y:auto;max-height:390px;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
    .time-grid{position:relative;user-select:none}
    .time-line{position:absolute;left:0;right:0;pointer-events:none}.time-line.hour-line{border-top:1px solid var(--border)}.time-line.half-line,.time-line.quarter-line{border-top:1px dashed #d8dde4}
    .time-label{position:absolute;left:6px;top:0;transform:translateY(-50%)}
    .time-drop-zone{position:absolute;left:46px;right:0;top:0;bottom:0;z-index:1}
    .time-now-line{position:absolute;left:0;right:0;height:2px;background:#d92d20;z-index:5}
    .time-now-line::before{content:'';position:absolute;left:43px;top:-4px;width:8px;height:8px;border-radius:50%;background:#d92d20}
    .cal-block{position:absolute;left:50px;right:6px;border-radius:8px;padding:4px 8px 10px;font-size:.74rem;cursor:grab;z-index:2;min-height:20px;border:1px solid transparent}
    .cal-block-title{font-weight:700;line-height:1.25}.cal-block-resize{position:absolute;left:0;right:0;bottom:0;height:8px;cursor:ns-resize}
    .cal-block.is-dragging{opacity:.8;cursor:grabbing;z-index:10}
    .cal-ghost{position:absolute;left:50px;right:6px;border:2px dashed #84add0;border-radius:8px;background:#eaf3fb;pointer-events:none;z-index:6;display:flex;align-items:center;justify-content:center}
    .cal-ghost-label{font-size:.72rem;color:var(--primary);font-weight:700}
    .cal-block-blue{background:#eff8ff;color:#175cd3;border-left:3px solid #2e90fa}.cal-block-green{background:#ecfdf3;color:#027a48;border-left:3px solid #12b76a}.cal-block-amber{background:#fffaeb;color:#b54708;border-left:3px solid #f79009}.cal-block-red{background:#fef3f2;color:#b42318;border-left:3px solid #f04438}.cal-block-purple{background:#f4f3ff;color:#5925dc;border-left:3px solid #7a5af8}.cal-block-slate{background:#f8fafc;color:#344054;border-left:3px solid #667085}
    .block-color-picker{display:flex;gap:8px;flex-wrap:wrap}.color-chip{width:24px;height:24px;border-radius:50%;border:2px solid transparent}.color-chip.active{border-color:#111}.color-chip-blue{background:#2e90fa}.color-chip-green{background:#12b76a}.color-chip-amber{background:#f79009}.color-chip-red{background:#f04438}.color-chip-purple{background:#7a5af8}.color-chip-slate{background:#667085}
    .cal-block-outlook{background:rgba(0,120,212,.1);border-left:3px solid #0078d4;color:#003a6e;cursor:default;z-index:1}
    .cal-push-btn{position:absolute;top:3px;right:6px;width:20px;height:20px;border:0;background:transparent;opacity:0}
    .cal-block:hover .cal-push-btn{opacity:.7}.cal-push-btn.synced{color:#067647}
    .ms-auth-btn{font-size:.72rem;border-radius:999px;padding:.35rem .7rem;background:var(--surface-soft);color:var(--primary)}
    .ms-signout-btn{border:none;background:transparent;text-decoration:underline;cursor:pointer}

    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:1rem;background:rgba(10,13,18,.45);z-index:50}
    .modal.open{display:flex}
    .modal-card{width:min(760px,100%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem;box-shadow:0 24px 60px rgba(10,13,18,.28)}
    .block-modal-card{width:min(480px,100%)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:.7rem}
    .modal-head h2{margin:0;font-size:1.05rem}
    .close-btn{border:none;background:transparent;color:var(--muted);font-size:1.5rem;line-height:1}
    .fields{margin-top:.8rem;display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
    .field-group,.platform-block,.status-block{display:grid;gap:.3rem}
    .field-group label,.platform-block strong,.status-block strong{font-size:.69rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
    .full,.field-hint{grid-column:1 / -1}
    .tag-picker,.status-picker,.project-status-options,.work-tags{display:flex;flex-wrap:wrap;gap:.4rem}
    .platform-chip{width:38px;height:38px;padding:0;border-radius:10px;display:grid;place-items:center}
    .platform-chip svg{width:20px;height:20px}
    .platform-chip.active,.status-tag.active,.project-status-option.active{background:var(--primary);border-color:var(--primary);color:#fff}

    .theme-toggle-fab{position:fixed;right:1rem;bottom:1rem;z-index:30;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:.48rem .75rem;display:inline-flex;align-items:center;gap:.4rem;box-shadow:var(--shadow)}

    body.dark-mode{
      --bg:#101418;--surface:#16202a;--surface-soft:#1f2a36;--text:#edf2f7;--muted:#a7b4c2;--border:#2d3a48;--primary:#73aef6;--primary-soft:#1a2f45;
    }
    body.dark-mode .topbar{background:rgba(22,32,42,.88)}
    body.dark-mode .cal-block-outlook{background:rgba(0,120,212,.2);color:#c6e5ff}

    @media (max-width:1120px){.calendar-board{grid-template-columns:repeat(3,minmax(0,1fr))}.work-grid{grid-template-columns:1fr}.project-grid{grid-template-columns:1fr}}
    @media (max-width:820px){.container{padding:.8rem}.fields{grid-template-columns:1fr}.calendar-board{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:560px){.calendar-board{grid-template-columns:1fr}.calendar-filter{width:calc(50% - .3rem);min-width:0}.toggle{width:100%}.toggle button{flex:1}.project-actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">IS</div>
        <div class="brand-text">
          <strong>Weekly Planner</strong>
          <span id="brandSubtitle">Integrated Staffing</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="week-badge" id="weekBadge">Week of --</span>
      </div>
    </header>


    <section class="panel glass">
      <div class="panel-head">
        <h2>Day Planner</h2>
        <div class="day-cal-controls">
          <button type="button" id="dayCalPrev" class="section-add" aria-label="Previous day">‹</button>
          <span id="dayCalLabel" class="day-cal-label">Today</span>
          <button type="button" id="dayCalNext" class="section-add" aria-label="Next day">›</button>
          <span id="dayCalTotal" class="day-cal-total"></span>
          <button type="button" id="msSignInBtn" class="ms-auth-btn">
            <svg width="12" height="12" viewBox="0 0 21 21" fill="none" aria-hidden="true"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
            Sync Outlook
          </button>
          <button type="button" id="msSyncBtn" class="ms-auth-btn" style="display:none">↻ Refresh</button>
          <button type="button" id="msSignOutBtn" class="ms-signout-btn" style="display:none">Sign out</button>
        </div>
      </div>
      <div class="panel-content" id="dailyCalContent">
        <div class="time-grid-wrap" id="timeGridWrap">
          <div class="time-grid" id="timeGrid"></div>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <section class="panel glass">
        <div class="panel-head">
          <h2>Calendar</h2>
          <div style="display:flex;align-items:center;gap:.65rem">
            <div class="toggle" role="tablist" aria-label="Staffing brand toggle">
              <button type="button" role="tab" aria-selected="true" aria-controls="plannerContent" tabindex="0" data-brand="is" class="active">IS</button>
              <button type="button" role="tab" aria-selected="false" aria-controls="plannerContent" tabindex="-1" data-brand="as">AS</button>
              <button type="button" role="tab" aria-selected="false" aria-controls="plannerContent" tabindex="-1" data-brand="ad">AD</button>
            </div>
            <button type="button" class="section-add calendar-add" id="calendarAddBtn" aria-label="Add post">+</button>
          </div>
        </div>
        <div class="calendar-controls">
          <select id="calendarPlatformFilter" class="calendar-filter" aria-label="Filter by platform">
            <option value="all">All platforms</option>
            <option value="linkedin">LinkedIn</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
          </select>
          <select id="calendarStatusFilter" class="calendar-filter" aria-label="Filter by status">
            <option value="all">All statuses</option>
            <option value="planned">Planned</option>
            <option value="scheduled">Scheduled</option>
            <option value="in progress">In Progress</option>
            <option value="posted">Posted</option>
          </select>
        </div>
        <div class="calendar-board" id="calendar"></div>
      </section>
    </section>

    <section class="panel glass" style="margin-top:1rem">
      <div class="panel-head">
        <h2>Recurring Tasks</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <button type="button" class="section-add calendar-add" id="recurringAddBtn" aria-label="Add recurring task">+</button>
          <button type="button" class="section-add" id="recurringToggle" aria-expanded="true" aria-label="Toggle recurring tasks section"></button>
        </div>
      </div>
      <div class="panel-content" id="recurringContent">
        <div class="recurring-list" id="recurringList"></div>
      </div>
    </section>

    <section class="work-grid">
      <section class="panel glass">
        <div class="panel-head">
          <h2>Project Tracker</h2>
          <button type="button" class="section-add" id="projectsToggle" aria-expanded="false" aria-label="Toggle project tracker section">+</button>
        </div>
        <div class="panel-content collapsed" id="projectsContent">
          <div class="project-grid" id="projectGrid"></div>
        </div>
      </section>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <section class="panel glass">
          <div class="panel-head">
            <h2>To Do List</h2>
            <button type="button" class="section-add" id="todosToggle" aria-expanded="false" aria-label="Toggle to do section">+</button>
          </div>
          <div class="panel-content collapsed" id="todosContent">
            <div class="todo-list" id="todoList"></div>
            <button type="button" class="new-task-btn" id="newTaskBtn">New task</button>
          </div>
        </section>
        <section class="panel glass">
          <div class="panel-head">
            <h2>Priorities</h2>
            <button type="button" class="section-add" id="prioritiesToggle" aria-expanded="false" aria-label="Toggle priorities section">+</button>
          </div>
          <div class="panel-content collapsed" id="prioritiesContent">
            <ul class="priority-list">
              <li><input id="priority1" type="text" placeholder="Priority 1" /></li>
              <li id="priorityItem2" class="hidden"><input id="priority2" type="text" placeholder="Priority 2" /></li>
              <li id="priorityItem3" class="hidden"><input id="priority3" type="text" placeholder="Priority 3" /></li>
            </ul>
          </div>
        </section>
      </div>
    </section>

    <div class="modal" id="editorModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div class="modal-head">
          <h2 id="editorTitle">Post Details • Monday</h2>
          <button type="button" class="close-btn" id="closeModal" aria-label="Close post editor">×</button>
        </div>
        <div class="fields">
          <p class="field-hint">Add the essentials and your calendar card updates instantly.</p>
          <div class="field-group full">
            <label for="postTitle">Post title</label>
            <input id="postTitle" placeholder="What are you posting about?" />
          </div>
          <div class="platform-block full">
            <strong>Platform</strong>
            <div class="tag-picker" id="platformPicker" aria-label="Select post platforms">
